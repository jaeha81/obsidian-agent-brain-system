name: obsidian-agent-brain

x-agent-common: &agent-common
  build:
    context: .
  working_dir: /workspace
  volumes:
    - ./:/workspace
  restart: unless-stopped

services:
  preflight:
    <<: *agent-common
    restart: "no"
    command: ["python", "scripts/preflight_check.py", "--docker"]

  raw-import-watcher:
    <<: *agent-common
    command: ["python", "scripts/raw_import_watcher.py"]

  codex-review-runner:
    <<: *agent-common
    profiles: ["host-cli"]
    command: ["python", "scripts/codex_review_runner.py"]

  agent-dispatcher:
    <<: *agent-common
    profiles: ["host-cli"]
    command: ["python", "scripts/agent_dispatcher.py"]

  # ── 자가복구 시스템 ──────────────────────────────────────────
  bucky-watchdog:
    <<: *agent-common
    restart: always
    command: ["python", "scripts/bucky_watchdog.py"]
    depends_on:
      - raw-import-watcher
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}

  health-monitor:
    <<: *agent-common
    restart: always
    command: ["python", "scripts/agent_health_monitor.py"]
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}

  recovery-handler:
    <<: *agent-common
    restart: always
    command: ["python", "scripts/bucky_recovery_handler.py"]
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
