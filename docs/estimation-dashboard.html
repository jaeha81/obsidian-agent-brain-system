<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JH Estimation System — Analysis Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161a22;
    --panel-2: #1c212b;
    --line: #262c38;
    --ink: #e6e8ec;
    --ink-mute: #9aa3b2;
    --ink-dim: #6b7280;
    --accent: #d4a574;
    --accent-2: #5b8db8;
    --ok: #6ba368;
    --warn: #d4a574;
    --bad: #c97064;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', 'Noto Sans KR', -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  .mono { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; letter-spacing: -0.01em; }

  /* Layout */
  .shell {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
  }
  .sidebar {
    border-right: 1px solid var(--line);
    background: var(--panel);
    padding: 28px 22px;
    position: sticky;
    top: 0;
    align-self: start;
    height: 100vh;
    overflow-y: auto;
  }
  .brand {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 6px;
  }
  .brand strong { color: var(--accent); }
  .brand-title {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 28px;
    letter-spacing: -0.01em;
  }
  .nav-label {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin: 18px 0 10px;
  }
  .nav-item {
    display: block;
    padding: 10px 12px;
    border-radius: 8px;
    color: var(--ink-mute);
    cursor: pointer;
    font-weight: 500;
    margin-bottom: 2px;
    transition: all 0.15s ease;
  }
  .nav-item:hover {
    background: var(--panel-2);
    color: var(--ink);
  }
  .nav-item.active {
    background: rgba(212, 165, 116, 0.08);
    color: var(--accent);
    border-left: 2px solid var(--accent);
    padding-left: 10px;
  }
  .nav-item .meta {
    font-size: 11px;
    color: var(--ink-dim);
    margin-top: 2px;
  }
  .nav-empty {
    padding: 10px 12px;
    color: var(--ink-dim);
    font-style: italic;
    font-size: 13px;
  }

  /* Main */
  .main { padding: 36px 44px 80px; max-width: 1320px; }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--line);
    padding-bottom: 22px;
    margin-bottom: 28px;
  }
  .page-title {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.015em;
  }
  .page-subtitle {
    color: var(--ink-mute);
    font-size: 13px;
    margin-top: 4px;
  }
  .generated {
    color: var(--ink-dim);
    font-size: 12px;
  }
  .generated .mono { color: var(--ink-mute); }

  /* Metrics */
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }
  .metric {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 22px;
  }
  .metric .label {
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 10px;
  }
  .metric .value {
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .metric .value .unit {
    font-size: 14px;
    color: var(--ink-mute);
    font-weight: 500;
    margin-left: 4px;
  }
  .metric .delta {
    font-size: 12px;
    color: var(--ink-mute);
    margin-top: 6px;
  }
  .metric .delta.ok { color: var(--ok); }
  .metric .delta.warn { color: var(--warn); }
  .metric .delta.bad { color: var(--bad); }

  /* Sections */
  .section-title {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    margin: 32px 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::before {
    content: '';
    width: 3px;
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  .grid-3 {
    display: grid;
    grid-template-columns: 1.2fr 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  @media (max-width: 1100px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .shell { grid-template-columns: 1fr; }
    .sidebar { position: relative; height: auto; border-right: none; border-bottom: 1px solid var(--line); }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px 24px;
  }
  .panel h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 16px;
    letter-spacing: -0.005em;
  }
  .panel h3 .hint {
    font-size: 11px;
    color: var(--ink-dim);
    font-weight: 400;
    margin-left: 8px;
  }

  /* Tables */
  .tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
  }
  .tbl th {
    text-align: left;
    color: var(--ink-dim);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 8px 6px;
    border-bottom: 1px solid var(--line);
  }
  .tbl td {
    padding: 8px 6px;
    border-bottom: 1px solid rgba(38, 44, 56, 0.5);
    color: var(--ink);
  }
  .tbl td.num {
    font-family: 'JetBrains Mono', monospace;
    text-align: right;
    color: var(--ink-mute);
  }
  .tbl td.code {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }
  .tbl tr:last-child td { border-bottom: none; }

  /* Category chips */
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-size: 11.5px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(212, 165, 116, 0.1);
    color: var(--accent);
    border: 1px solid rgba(212, 165, 116, 0.2);
  }
  .chip.alt {
    background: rgba(91, 141, 184, 0.1);
    color: var(--accent-2);
    border-color: rgba(91, 141, 184, 0.2);
  }

  /* Reliability badge */
  .rel { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; padding: 3px 9px; border-radius: 6px; font-weight: 500; }
  .rel.high { background: rgba(107, 163, 104, 0.12); color: var(--ok); }
  .rel.med { background: rgba(212, 165, 116, 0.12); color: var(--warn); }
  .rel.low { background: rgba(201, 112, 100, 0.12); color: var(--bad); }
  .rel::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* Chart wrappers */
  .chart-wrap { position: relative; height: 240px; }
  .chart-wrap.tall { height: 320px; }

  /* Pipeline */
  .pipeline {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 14px;
  }
  .stage {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px 14px;
    position: relative;
  }
  .stage .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--accent);
    letter-spacing: 0.08em;
  }
  .stage .name {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin: 4px 0 6px;
  }
  .stage .desc {
    font-size: 11.5px;
    color: var(--ink-mute);
    line-height: 1.45;
  }
  .stage.done { border-color: rgba(107, 163, 104, 0.4); }
  .stage.done .num { color: var(--ok); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--ink-mute);
  }
  .empty h2 { font-size: 18px; color: var(--ink); margin-bottom: 8px; }

  /* Footer */
  .foot {
    margin-top: 60px;
    padding-top: 22px;
    border-top: 1px solid var(--line);
    color: var(--ink-dim);
    font-size: 12px;
    display: flex;
    justify-content: space-between;
  }
  .foot a:hover { color: var(--accent); }

  /* Auth gate */
  .auth-gate {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  .auth-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 40px 36px;
    width: 360px;
    text-align: center;
  }
  .auth-brand {
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .auth-title {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  .auth-sub {
    font-size: 12px;
    color: var(--ink-dim);
    margin-bottom: 28px;
  }
  .auth-input {
    width: 100%;
    padding: 13px 14px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    letter-spacing: 0.3em;
    text-align: center;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .auth-input:focus { border-color: var(--accent); }
  .auth-btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: var(--bg);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .auth-btn:hover { opacity: 0.88; }
  .auth-err {
    color: var(--bad);
    font-size: 12px;
    margin-top: 14px;
    min-height: 16px;
  }

  /* Estimate cards */
  .estimate-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 14px;
  }
  .est-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px 24px;
    position: relative;
  }
  .est-card.avg { border-color: rgba(212, 165, 116, 0.4); }
  .est-card .est-label {
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 8px;
  }
  .est-card .est-value {
    font-family: 'Inter', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .est-card .est-value .unit { font-size: 13px; color: var(--ink-mute); margin-left: 3px; font-weight: 500; }
  .est-card .est-meta { font-size: 11px; color: var(--ink-mute); }
  .est-card.avg .est-value { color: var(--accent); }

  /* Cost breakdown table */
  .breakdown-row {
    display: grid;
    grid-template-columns: 1fr repeat(3, 1fr);
    padding: 9px 0;
    border-bottom: 1px solid rgba(38, 44, 56, 0.5);
    font-size: 13px;
  }
  .breakdown-row.head {
    color: var(--ink-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
  }
  .breakdown-row .num {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink-mute);
    font-size: 12.5px;
  }
  .breakdown-row.total { font-weight: 700; color: var(--accent); border-bottom: none; padding-top: 14px; }
  .breakdown-row.total .num { color: var(--accent); font-weight: 700; }

  /* Download button */
  .download-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: rgba(91, 141, 184, 0.1);
    color: var(--accent-2);
    border: 1px solid rgba(91, 141, 184, 0.3);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .download-btn:hover {
    background: rgba(91, 141, 184, 0.18);
    border-color: var(--accent-2);
  }

  /* BOQ table wrapper */
  .boq-wrap {
    max-height: 560px;
    overflow-y: auto;
    border: 1px solid var(--line);
    border-radius: 10px;
  }
  .boq-wrap::-webkit-scrollbar { width: 8px; }
  .boq-wrap::-webkit-scrollbar-track { background: var(--panel); }
  .boq-wrap::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  .boq-tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .boq-tbl thead { position: sticky; top: 0; background: var(--panel-2); z-index: 1; }
  .boq-tbl th {
    text-align: left;
    color: var(--ink-dim);
    font-weight: 500;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 10px 8px;
    border-bottom: 1px solid var(--line);
    background: var(--panel-2);
  }
  .boq-tbl td {
    padding: 7px 8px;
    border-bottom: 1px solid rgba(38, 44, 56, 0.4);
    color: var(--ink);
    vertical-align: top;
  }
  .boq-tbl td.num {
    font-family: 'JetBrains Mono', monospace;
    text-align: right;
    color: var(--ink-mute);
    font-size: 11.5px;
    white-space: nowrap;
  }
  .boq-tbl td.price { color: var(--ok); font-weight: 500; }
  .boq-tbl td.amount { color: var(--ink); font-weight: 600; }
  .boq-tbl tbody tr:hover { background: rgba(212, 165, 116, 0.04); }
  .gongje-chip {
    display: inline-block;
    font-size: 10.5px;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(212, 165, 116, 0.1);
    color: var(--accent);
    white-space: nowrap;
  }
  .boq-search {
    width: 240px;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    outline: none;
  }
  .boq-search:focus { border-color: var(--accent); }

  /* Missing items chips */
  .missing-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11.5px;
    padding: 5px 11px;
    border-radius: 6px;
    background: rgba(201, 112, 100, 0.08);
    color: var(--bad);
    border: 1px solid rgba(201, 112, 100, 0.2);
    margin: 3px 5px 3px 0;
  }
  .missing-chip::before {
    content: '!';
    font-weight: 700;
    font-size: 10px;
  }
</style>
</head>
<body>
<div class="auth-gate" id="auth-gate">
  <div class="auth-card">
    <div class="auth-brand">JH · 견적 시스템</div>
    <div class="auth-title">접근 인증</div>
    <div class="auth-sub">비밀번호를 입력해 주세요</div>
    <input id="auth-input" class="auth-input" type="password" inputmode="numeric" maxlength="12" autocomplete="off" placeholder="••••" />
    <button class="auth-btn" onclick="tryAuth()">접속</button>
    <div id="auth-err" class="auth-err"></div>
  </div>
</div>

<div class="shell" id="shell" style="display:none">
  <aside class="sidebar">
    <div class="brand">JH · <strong>견적 시스템</strong></div>
    <div class="brand-title">Estimation Analysis</div>

    <div class="nav-label">Projects</div>
    <div id="nav-list">
      <div class="nav-empty">불러오는 중...</div>
    </div>

    <div class="nav-label">Pipeline</div>
    <div class="nav-item" onclick="document.getElementById('cost-section').scrollIntoView({behavior:'smooth'})">견적 금액</div>
    <div class="nav-item" onclick="document.getElementById('pipeline-section').scrollIntoView({behavior:'smooth'})">분석 단계</div>
    <div class="nav-item" onclick="document.getElementById('drawings-section').scrollIntoView({behavior:'smooth'})">도면 인식</div>
    <div class="nav-item" onclick="document.getElementById('boq-priced-section').scrollIntoView({behavior:'smooth'})">단가 대입 BOQ</div>
    <div class="nav-item" onclick="document.getElementById('boq-section').scrollIntoView({behavior:'smooth'})">BOQ 분석</div>
  </aside>

  <main class="main" id="main">
    <div class="empty"><h2>로딩 중...</h2></div>
  </main>
</div>

<script>
const NUMBER_FMT = new Intl.NumberFormat('ko-KR');
const fmt = (n) => (n == null ? '—' : NUMBER_FMT.format(Math.round(n)));

const CATEGORY_COLOR = {
  PLAN: '#5b8db8',
  ELECTRICAL: '#d4a574',
  KITCHEN: '#9b7eb7',
  DETAIL: '#6ba368',
  FURNITURE: '#c97064',
  SIGNAGE: '#e0b34a',
  MECHANICAL: '#7a8597',
};

async function loadIndex() {
  try {
    const res = await fetch('data/estimation/index.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('index 404');
    return await res.json();
  } catch (e) {
    return { bundles: [] };
  }
}

async function loadBundle(file) {
  const res = await fetch('data/estimation/' + file, { cache: 'no-store' });
  if (!res.ok) throw new Error('bundle 404');
  return await res.json();
}

function renderNav(bundles, activeSlug) {
  const nav = document.getElementById('nav-list');
  if (!bundles.length) {
    nav.innerHTML = '<div class="nav-empty">등록된 프로젝트가 없습니다</div>';
    return;
  }
  nav.innerHTML = bundles.map(b => {
    const m = b.summary || {};
    const name = (m.project_meta && m.project_meta.project_name) || b.slug;
    const date = (b.generated_at || '').split(' ')[0];
    return `<div class="nav-item ${b.slug===activeSlug?'active':''}" onclick="selectProject('${b.file}')">
      <div>${name}</div>
      <div class="meta">${date} · ${m.total_items || 0} items</div>
    </div>`;
  }).join('');
}

function reliabilityForBundle(b) {
  const s = b.summary || {};
  const total = s.drawing_page_count || 0;
  const imgOnly = s.image_only_pages || 0;
  if (!total) return { level: 'low', label: 'LOW · 도면 없음' };
  const textRatio = (total - imgOnly) / total;
  if (textRatio >= 0.8) return { level: 'high', label: 'HIGH · 텍스트 추출 ' + Math.round(textRatio*100) + '%' };
  if (textRatio >= 0.4) return { level: 'med', label: 'MED · 텍스트 추출 ' + Math.round(textRatio*100) + '%' };
  return { level: 'low', label: 'LOW · OCR 폴백 필요' };
}

function renderProject(bundle) {
  const s = bundle.summary || {};
  const meta = s.project_meta || {};
  const rel = reliabilityForBundle(bundle);
  const amount = s.amount_total || 0;
  const main = document.getElementById('main');

  main.innerHTML = `
    <div class="topbar">
      <div>
        <div class="page-title">${meta.project_name || bundle.slug}</div>
        <div class="page-subtitle">${meta.client ? meta.client + ' · ' : ''}slug: <span class="mono">${bundle.slug}</span></div>
      </div>
      <div class="generated">
        <div>generated</div>
        <div class="mono">${bundle.generated_at || '—'}</div>
        <div style="margin-top:8px"><span class="rel ${rel.level}">${rel.label}</span></div>
      </div>
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="label">견적 합계 (VAT 포함, 평균)</div>
        <div class="value">${fmt(Math.round((s.cost_estimate_avg||0)/10000))}<span class="unit">만원</span></div>
        <div class="delta">최소 ${fmt(Math.round((s.cost_estimate_min||0)/10000))}만 · 최대 ${fmt(Math.round((s.cost_estimate_max||0)/10000))}만</div>
      </div>
      <div class="metric">
        <div class="label">실측 면적 / 평당 단가</div>

let _boqAllRows = [];
function drawBoqPricedTable(bundle) {
  const items = bundle.boq_priced_items || [];
  const tbody = document.getElementById('boq-priced-tbody');
  if (!tbody) return;
  _boqAllRows = items.map(it => {
    const conf = it['신뢰도'] || '';
    const relLevel = conf.includes('HIGH') ? 'high' : conf.includes('LOW') ? 'low' : 'med';
    return {
      g: it['공종'] || '—',
      name: it['품명'] || '—',
      spec: it['규격'] || '',
      unit: it['단위'] || '',
      qty: it['수량'],
      price: it['단가'],
      amount: it['금액'],
      relLevel,
      relLabel: conf,
      search: ((it['공종']||'') + ' ' + (it['품명']||'') + ' ' + (it['규격']||'')).toLowerCase(),
    };
  });
  renderBoqRows(_boqAllRows);
}

function renderBoqRows(rows) {
  const tbody = document.getElementById('boq-priced-tbody');
  if (!tbody) return;
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--ink-dim)">매칭 결과 없음</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td><span class="gongje-chip">${r.g}</span></td>
      <td>${r.name}</td>
      <td class="mono" style="color:var(--ink-mute);font-size:11px">${r.spec || '—'}</td>
      <td class="num">${r.unit || '—'}</td>
      <td class="num">${r.qty != null ? fmt(r.qty) : '—'}</td>
      <td class="num price">${r.price != null ? fmt(r.price) : '—'}</td>
      <td class="num amount">${r.amount != null ? fmt(r.amount) : '—'}</td>
      <td style="text-align:center"><span class="rel ${r.relLevel}" style="font-size:10px;padding:2px 6px">${r.relLevel.toUpperCase()}</span></td>
    </tr>
  `).join('');
}

function filterBoq(q) {
  const k = (q || '').trim().toLowerCase();
  if (!k) return renderBoqRows(_boqAllRows);
  renderBoqRows(_boqAllRows.filter(r => r.search.includes(k)));
}

function drawCostSection(bundle) {
  const ce = bundle.cost_estimate || {};
  const avg = ce.total_avg || {};
  const min = ce.total_min || {};
  const max = ce.total_max || {};

  // Cost range table
  const rangeRows = [
    ['최소 (raw × 0.85)', min['합계_VAT포함']],
    ['평균 (단가 매핑)', avg['합계_VAT포함']],
    ['최대 (야간할증 15%)', max['합계_VAT포함']],
  ];
  document.getElementById('tbl-cost-range').innerHTML = rangeRows.map(([k, v], i) => `
    <tr>
      <td>${k}</td>
      <td class="num" style="color:${i===1?'var(--accent)':'var(--ink)'};font-weight:${i===1?'700':'500'}">${fmt(v)}</td>
    </tr>
  `).join('');

  // Cost breakdown table
  const breakdownKeys = ['직접공사비', '간접비', '안전관리비', '산재보험', '소계', 'VAT', '합계_VAT포함'];
  const totalVat = avg['합계_VAT포함'] || 1;
  document.getElementById('tbl-cost-breakdown').innerHTML = breakdownKeys.map(k => {
    const v = avg[k] || 0;
    const pct = ((v / totalVat) * 100).toFixed(1);
    const isTotal = k === '합계_VAT포함';
    return `
      <tr style="${isTotal?'border-top:1px solid var(--line)':''}">
        <td style="font-weight:${isTotal?'700':'500'}">${k.replace('_', ' ')}</td>
        <td class="num" style="color:${isTotal?'var(--accent)':'var(--ink-mute)'};font-weight:${isTotal?'700':'500'}">${fmt(v)}</td>
        <td class="num">${pct}%</td>
      </tr>
    `;
  }).join('');

  // Cost note
  const noteEl = document.getElementById('cost-note');
  if (noteEl) {
    noteEl.innerHTML = `
      <div><strong style="color:var(--ink)">방식</strong>: ${ce.method || '—'}</div>
      <div style="margin-top:6px"><strong style="color:var(--ink)">비고</strong>: ${ce.note || '—'}</div>
      <div style="margin-top:6px">평균 단가 m²당 <span class="mono" style="color:var(--accent)">${fmt(ce.per_m2_avg)}원</span> · 평당 <span class="mono" style="color:var(--accent)">${fmt(ce.per_pyeong_avg)}원</span></div>
    `;
  }

  // Confidence doughnut
  const cc = ce.confidence_counter || {};
  const ccLabels = Object.keys(cc);
  if (ccLabels.length) {
    new Chart(document.getElementById('ch-confidence'), {
      type: 'doughnut',
      data: {
        labels: ccLabels,
        datasets: [{
          data: ccLabels.map(k => cc[k]),
          backgroundColor: ccLabels.map(k => k.includes('LOW') ? '#c97064' : k.includes('MED') ? '#d4a574' : k.includes('HIGH') ? '#6ba368' : '#7a8597'),
          borderColor: '#161a22',
          borderWidth: 2,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { color: '#9aa3b2', font: { size: 11 }, padding: 10, boxWidth: 12 } } },
        cutout: '60%',
      },
    });
  }

  // Gongje (work group) actual cost bar
  const gongje = ce.gongje_breakdown || {};
  const gEntries = Object.entries(gongje).sort((a, b) => b[1] - a[1]);
  new Chart(document.getElementById('ch-gongje-cost'), {
    type: 'bar',
    data: {
      labels: gEntries.map(([k]) => k),
      datasets: [{
        data: gEntries.map(([, v]) => v),
        backgroundColor: '#5b8db8',
        borderRadius: 4,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: 'y',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: (ctx) => fmt(ctx.parsed.x) + ' 원' } },
      },
      scales: {
        x: { ticks: { color: '#6b7280', font: { size: 10 }, callback: (v) => fmt(v/10000) + '만' }, grid: { color: '#262c38' } },
        y: { ticks: { color: '#9aa3b2', font: { size: 11 } }, grid: { display: false } },
      },
    },
  });

  // Missing items list
  const missing = ce.missing_from_briefing || [];
  const ml = document.getElementById('missing-list');
  if (ml) {
    ml.innerHTML = missing.length
      ? missing.map((m, i) => `<li style="padding:6px 0;border-bottom:1px solid rgba(38,44,56,0.4)"><span class="mono" style="color:var(--accent);margin-right:8px">${String(i+1).padStart(2,'0')}</span>${m}</li>`).join('')
      : '<li style="color:var(--ink-dim);font-style:italic">감지된 누락 항목 없음</li>';
  }
}

function drawCharts(bundle) {
  const s = bundle.summary || {};
  const catCount = bundle.drawing_category_count || s.drawing_category_count || {};
  const roleCount = bundle.drawing_role_count || {};
  const wg = s.work_group_distribution || {};
  const units = s.unit_distribution || {};

  const baseOpts = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { labels: { color: '#9aa3b2', font: { size: 11 } } } },
    scales: {
      x: { ticks: { color: '#6b7280', font: { size: 10 } }, grid: { color: '#262c38' } },
      y: { ticks: { color: '#6b7280', font: { size: 10 } }, grid: { color: '#262c38' } },
    },
  };

  // Category doughnut
  new Chart(document.getElementById('ch-cat'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(catCount),
      datasets: [{
        data: Object.values(catCount),
        backgroundColor: Object.keys(catCount).map(k => CATEGORY_COLOR[k] || '#7a8597'),
        borderColor: '#161a22',
        borderWidth: 2,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { color: '#9aa3b2', font: { size: 11 }, padding: 10, boxWidth: 12 } } },
      cutout: '60%',
    },
  });

  // Role bar
  const roleLabels = Object.keys(roleCount);
  new Chart(document.getElementById('ch-role'), {
    type: 'bar',
    data: {
      labels: roleLabels,
      datasets: [{
        data: Object.values(roleCount),
        backgroundColor: '#5b8db8',
        borderRadius: 4,
      }],
    },
    options: { ...baseOpts, indexAxis: 'y', plugins: { legend: { display: false } } },
  });

  // Work group bar
  new Chart(document.getElementById('ch-wg'), {
    type: 'bar',
    data: {
      labels: Object.keys(wg),
      datasets: [{
        data: Object.values(wg),
        backgroundColor: '#d4a574',
        borderRadius: 4,
      }],
    },
    options: { ...baseOpts, indexAxis: 'y', plugins: { legend: { display: false } } },
  });

  // Unit polar
  new Chart(document.getElementById('ch-unit'), {
    type: 'polarArea',
    data: {
      labels: Object.keys(units),
      datasets: [{
        data: Object.values(units),
        backgroundColor: ['#5b8db8','#d4a574','#9b7eb7','#6ba368','#c97064','#e0b34a','#7a8597','#a18e6b','#4f6f8f','#8a6f95','#557e54'].map(c => c + 'cc'),
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'right', labels: { color: '#9aa3b2', font: { size: 10 } } } },
      scales: { r: { ticks: { color: '#6b7280', backdropColor: 'transparent', font: { size: 9 } }, grid: { color: '#262c38' }, angleLines: { color: '#262c38' } } },
    },
  });
}

function drawTables(bundle) {
  // Material chips
  const matChips = document.getElementById('material-chips');
  const mats = bundle.material_pages || [];
  matChips.innerHTML = mats.length
    ? mats.map(p => `<span class="chip alt">page ${p}</span>`).join('')
    : '<span style="color:var(--ink-dim);font-size:12px">감지된 자재 페이지 없음</span>';

  // Drawing codes table
  const codes = bundle.drawing_code_top || [];
  document.getElementById('tbl-codes').innerHTML = `
    <thead><tr><th>code</th><th style="text-align:right">count</th></tr></thead>
    <tbody>${codes.slice(0, 12).map(([c, n]) => `
      <tr><td class="code">${c}</td><td class="num">${n}</td></tr>
    `).join('')}</tbody>
  `;

  // Sheets
  const sheetsPanel = document.getElementById('sheets-panel');
  const sheets = bundle.boq_sheets || [];
  if (!sheets.length) {
    sheetsPanel.innerHTML = '<div style="color:var(--ink-mute);text-align:center;padding:30px">BOQ 시트 없음</div>';
    return;
  }
  sheetsPanel.innerHTML = sheets.map(sh => `
    <div style="margin-bottom:24px;${sh === sheets[sheets.length-1]?'margin-bottom:0':''}">
      <h3>${sh.sheet} <span class="hint">${sh.item_count} items · ${(sh.work_groups||[]).length} 공종</span></h3>
      <div class="chips" style="margin-bottom:10px">${(sh.work_groups || []).slice(0, 10).map(g => `<span class="chip">${g}</span>`).join('')}</div>
      <table class="tbl">
        <thead><tr><th>공종</th><th>명칭</th><th>제조사</th><th>규격</th><th style="text-align:right">단위</th><th style="text-align:right">수량</th><th style="text-align:right">단가</th></tr></thead>
        <tbody>${(sh.sample_items || []).slice(0, 8).map(it => `
          <tr>
            <td><span class="chip alt" style="font-size:11px;padding:2px 7px">${it.work_group || '—'}</span></td>
            <td>${it.name || '—'}</td>
            <td style="color:var(--ink-mute)">${it.manufacturer || '—'}</td>
            <td class="mono" style="color:var(--ink-mute)">${it.spec || '—'}</td>
            <td class="num">${it.unit || '—'}</td>
            <td class="num">${it.qty != null ? fmt(it.qty) : '—'}</td>
            <td class="num" style="color:${it.unit_price?'var(--ok)':'var(--ink-dim)'}">${it.unit_price ? fmt(it.unit_price) : '—'}</td>
          </tr>
        `).join('')}</tbody>
      </table>
    </div>
  `).join('');
}

async function selectProject(file) {
  try {
    const bundle = await loadBundle(file);
    const idx = await loadIndex();
    renderNav(idx.bundles, bundle.slug);
    renderProject(bundle);
  } catch (e) {
    document.getElementById('main').innerHTML = `<div class="empty"><h2>로딩 실패</h2><div>${e.message}</div></div>`;
  }
}

async function init() {
  const idx = await loadIndex();
  if (!idx.bundles.length) {
    renderNav([]);
    document.getElementById('main').innerHTML = `
      <div class="topbar">
        <div>
          <div class="page-title">JH Estimation Dashboard</div>
          <div class="page-subtitle">PDF 도면 + XLS 견적서 자동 분석 시스템</div>
        </div>
      </div>
      <div class="empty">
        <h2>등록된 프로젝트가 없습니다</h2>
        <div style="margin-top:12px;font-size:13px">분석 실행:</div>
        <div class="mono" style="margin-top:10px;color:var(--accent)">python -X utf8 scripts/estimation/boq_builder.py --pdf &lt;pdf&gt; --xls &lt;xls&gt; --slug &lt;name&gt;</div>
      </div>`;
    return;
  }
  renderNav(idx.bundles, idx.bundles[0].slug);
  const bundle = await loadBundle(idx.bundles[0].file);
  renderProject(bundle);
}

// === Auth gate ===
const AUTH_PASSWORD = '1224';
const AUTH_KEY = 'jh_est_auth_v1';

function tryAuth() {
  const v = (document.getElementById('auth-input').value || '').trim();
  if (v === AUTH_PASSWORD) {
    sessionStorage.setItem(AUTH_KEY, '1');
    showApp();
  } else {
    const err = document.getElementById('auth-err');
    err.textContent = '비밀번호가 일치하지 않습니다.';
    const inp = document.getElementById('auth-input');
    inp.value = '';
    inp.focus();
  }
}

function showApp() {
  document.getElementById('auth-gate').style.display = 'none';
  const shell = document.getElementById('shell');
  if (shell) shell.style.display = '';
  init();
}

(function bootstrap() {
  if (sessionStorage.getItem(AUTH_KEY) === '1') {
    showApp();
    return;
  }
  const inp = document.getElementById('auth-input');
  if (inp) {
    inp.focus();
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryAuth(); });
  }
})();
</script>
