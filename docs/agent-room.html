<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#58a6ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bucky">
<link rel="apple-touch-icon" href="/icons/icon-192.svg">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js');}</script>
<title>Agent Room — JH</title>
<script>
(function(){
  function getCookie(n){var v=document.cookie.split(';');for(var i=0;i<v.length;i++){var p=v[i].trim();if(p.startsWith(n+'='))return p.substring(n.length+1);}return '';}
  document.documentElement.style.visibility='hidden';
  if(!getCookie('bucky_auth')){location.replace('/login.html?r='+encodeURIComponent(location.pathname));}
  else{document.documentElement.style.visibility='';}
})();
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  header {
    background: linear-gradient(135deg, #1a2332 0%, #0d1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 22px 32px 18px;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  header p  { color: var(--muted); font-size: 0.82rem; margin-top: 4px; }
  .jh-nav { display:flex; gap:8px; flex-wrap:wrap; align-items:center; justify-content:flex-end; }
  .jh-nav a {
    font-size:0.78rem; color:var(--muted); text-decoration:none; border:1px solid var(--border);
    padding:5px 12px; border-radius:20px; transition:all 0.2s; line-height:1.2;
  }
  .jh-nav a:hover, .jh-nav a.active { border-color:var(--accent); color:var(--accent); background:rgba(88,166,255,0.08); }

  .page-wrap { max-width: 1200px; margin: 0 auto; padding: 24px 32px; }

  /* ── Agent Room ── */
  .ar-top { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .ar-top h2 { font-size: 1.1rem; font-weight: 700; color: var(--text); }
  .agents-badge { font-size: 11px; padding: 3px 10px; border-radius: 12px; background: rgba(34,197,94,0.1); color: #9ca3af; border: 1px solid rgba(34,197,94,0.2); font-weight: 600; }

  .agent-room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }

  .ar-card { background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.07); border-left: 3px solid transparent; border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 8px; transition: border-color 0.2s, transform 0.15s; }
  .ar-card:hover { transform: translateY(-1px); border-color: rgba(14,165,233,0.3); }
  .ar-card.s-online, .ar-card.s-active  { border-left-color: #22c55e; }
  .ar-card.s-standby { border-left-color: #f59e0b; }
  .ar-card.s-idle    { border-left-color: #6b7280; }
  .ar-card.s-pending { border-left-color: #374151; }
  .ar-card.s-offline { border-left-color: #ef4444; }
  .ar-header { display: flex; align-items: center; gap: 10px; }
  .ar-emoji  { font-size: 22px; line-height: 1; }
  .ar-name   { font-weight: 700; font-size: 14px; color: #e0e0e0; }
  .ar-role   { font-size: 10px; color: #0ea5e9; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
  .ar-status-badge { margin-left: auto; font-size: 10px; padding: 2px 7px; border-radius: 4px; white-space: nowrap; font-weight: 600; }
  .ar-desc   { font-size: 12px; color: #888; line-height: 1.45; flex: 1; }
  .ar-tags   { display: flex; flex-wrap: wrap; gap: 4px; }
  .ar-tag    { font-size: 10px; background: rgba(14,165,233,0.1); color: #7dd3fc; border-radius: 4px; padding: 2px 6px; }
  .ar-call-btn { margin-top: 4px; padding: 6px 12px; background: rgba(14,165,233,0.12); border: 1px solid rgba(14,165,233,0.28); border-radius: 6px; color: #7dd3fc; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .ar-call-btn:hover { background: rgba(14,165,233,0.28); }
  .ar-call-note { font-size: 11px; color: #4b5563; margin-top: 4px; }

  /* ── Modal ── */
  #agent-call-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 9000; align-items: center; justify-content: center; }
  #agent-call-modal.open { display: flex; }
  .acm-box { background: #0f0f1e; border: 1px solid rgba(14,165,233,0.25); border-radius: 14px; padding: 24px; width: min(520px, 92vw); max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
  .acm-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .acm-title  { font-size: 16px; font-weight: 700; color: #e0e0e0; }
  .acm-close  { background: none; border: none; color: #666; cursor: pointer; font-size: 22px; line-height: 1; padding: 0; }
  .acm-close:hover { color: #e0e0e0; }
  .acm-desc   { font-size: 12px; color: #6b7280; margin: 0 0 14px; }
  .acm-textarea { width: 100%; min-height: 110px; background: #0a0a18; border: 1px solid #2a2a3e; border-radius: 8px; padding: 10px; color: #d1d5db; font-size: 13px; resize: vertical; box-sizing: border-box; font-family: inherit; }
  .acm-textarea:focus { outline: none; border-color: rgba(14,165,233,0.5); }
  .acm-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
  .acm-cancel { padding: 8px 16px; background: #1f1f2e; border: 1px solid #333; border-radius: 6px; color: #9ca3af; cursor: pointer; font-size: 13px; }
  .acm-submit { padding: 8px 18px; background: #0ea5e9; border: none; border-radius: 6px; color: #fff; cursor: pointer; font-size: 13px; font-weight: 700; }
  .acm-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .acm-feedback { margin-top: 10px; font-size: 12px; min-height: 18px; }

  footer { padding: 24px 32px; color: var(--muted); font-size: 0.78rem; border-top: 1px solid var(--border); margin-top: 40px; }

  @media (max-width: 640px) {
    .page-wrap { padding: 16px; }
    .agent-room-grid { grid-template-columns: 1fr; }
  }
</style>
<script src="/shared/nav.js" defer></script>
</head>
<body>

<header style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
  <div style="flex:1">
    <h1>🤖 Agent Room</h1>
    <p>에이전트 상태 모니터링 · 호출 및 작업 전달 · Bucky 오케스트레이터 연동</p>
  </div>
  <nav class="jh-nav"></nav>
</header>

<div class="page-wrap">
  <div class="ar-top">
    <h2>🤖 에이전트 현황</h2>
    <span class="agents-badge" id="agents-badge">로드 중…</span>
  </div>
  <div id="agents-body"></div>
</div>

<footer>
  Agent Room · 호출은 Discord Webhook으로 전달됩니다 · <a href="index.html" style="color:inherit">대시보드</a>에서 Webhook 설정
</footer>

<!-- Agent Call Modal -->
<div id="agent-call-modal">
  <div class="acm-box">
    <div class="acm-header">
      <span class="acm-title" id="acm-title">에이전트 호출</span>
      <button class="acm-close" onclick="closeAgentModal()">✕</button>
    </div>
    <p class="acm-desc" id="acm-desc"></p>
    <textarea class="acm-textarea" id="acm-input" placeholder="이 에이전트에게 전달할 작업을 입력하세요…"></textarea>
    <div class="acm-footer">
      <button class="acm-cancel" onclick="closeAgentModal()">취소</button>
      <button class="acm-submit" id="acm-submit" onclick="submitAgentCall()">호출</button>
    </div>
    <div class="acm-feedback" id="acm-feedback"></div>
  </div>
</div>

<script>
const _AR_API = (window.location.protocol === 'file:' || /\.pages\.dev$|\.github\.io$|\.vercel\.app$/i.test(window.location.hostname))
  ? 'http://localhost:8765' : '';
const _DEMO_AGENTS = { agents: [
  { id:'bucky',            name:'Bucky',            emoji:'🧠', role:'오케스트레이터',     description:'중앙 조율, Context Pack 생성, 작업 분류 및 라우팅',       domain:['전략','브리핑','라우팅'],  status:'online',  callable:true,  call_endpoint:'/chat' },
  { id:'claude_code',      name:'Claude Code',      emoji:'⚡', role:'1번 구현자',         description:'프론트엔드 / UI / HTML / CSS / 아키텍처 구현',            domain:['프론트엔드','UI','HTML'],  status:'online',  callable:true,  call_endpoint:'/intake' },
  { id:'codex',            name:'Codex',            emoji:'🔧', role:'2번 구현자',         description:'백엔드 / 스크립트 / API / 자동화 / 버그 수정',            domain:['백엔드','스크립트','API'], status:'standby', callable:true,  call_endpoint:'/intake' },
  { id:'wishket_agent',    name:'Wishket Agent',    emoji:'💼', role:'수주 자동화',        description:'Wishket 프리랜서 프로젝트 탐색, 제안서 생성, 자동 매칭',  domain:['Wishket','프리랜서'],     status:'idle',    callable:true,  call_endpoint:'/intake' },
  { id:'gemini_research',  name:'Gemini Research',  emoji:'🔍', role:'리서치 에이전트',   description:'웹 / 시장 / 기술 리서치, 출처 기반 요약',                 domain:['리서치','검색','트렌드'], status:'pending', callable:false, call_note:'GEMINI_API_KEY 미등록' },
  { id:'gemini_multimodal',name:'Gemini Multimodal',emoji:'🏗️', role:'이미지 / 도면 분석',description:'AutoCAD 도면, 현장사진, 자재 이미지 분석',               domain:['도면','이미지'],          status:'pending', callable:false, call_note:'GEMINI_API_KEY 미등록' },
  { id:'gemini_content',   name:'Gemini Content',   emoji:'✍️', role:'콘텐츠 생성',       description:'블로그, 유튜브 쇼츠, SNS 광고문구, 영상 프롬프트 생성',  domain:['블로그','유튜브','SNS'],  status:'pending', callable:false, call_note:'GEMINI_API_KEY 미등록' },
  { id:'gemini_validator', name:'Gemini Validator', emoji:'✅', role:'교차 검증',           description:'Claude / Codex 산출물 독립 교차검증',                    domain:['검증','리뷰','QA'],        status:'pending', callable:false, call_note:'GEMINI_API_KEY 미등록' },
]};
const _AR_SC = { online:'#22c55e', active:'#22c55e', standby:'#f59e0b', idle:'#9ca3af', pending:'#374151', offline:'#ef4444' };
const _AR_SL = { online:'ONLINE', active:'ACTIVE', standby:'STANDBY', idle:'IDLE', pending:'보류중', offline:'OFFLINE' };
let _arReg = [];
let _arAgent = null;
function arEsc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderAgents(d) {
  const body = document.getElementById('agents-body');
  const badge = document.getElementById('agents-badge');
  const agents = d.agents || [];
  _arReg = agents;
  const onCnt = agents.filter(a => ['online','active'].includes(a.status)).length;
  badge.textContent = `${onCnt}/${agents.length} ACTIVE`;
  if (onCnt > 0) { badge.style.background='rgba(34,197,94,0.15)'; badge.style.color='#22c55e'; badge.style.borderColor='rgba(34,197,94,0.35)'; }
  body.innerHTML = `<div class="agent-room-grid">${agents.map(a => {
    const sc = _AR_SC[a.status]||'#6b7280', sl = _AR_SL[a.status]||a.status.toUpperCase();
    const tags = (a.domain||[]).slice(0,4).map(t=>`<span class="ar-tag">${arEsc(t)}</span>`).join('');
    const action = a.callable
      ? `<button class="ar-call-btn" onclick="openAgentModal('${arEsc(a.id)}')">호출하기</button>`
      : `<div class="ar-call-note">${arEsc(a.call_note||'비활성')}</div>`;
    return `<div class="ar-card s-${arEsc(a.status)}">
      <div class="ar-header"><span class="ar-emoji">${arEsc(a.emoji)}</span>
        <div><div class="ar-name">${arEsc(a.name)}</div><div class="ar-role">${arEsc(a.role)}</div></div>
        <span class="ar-status-badge" style="background:${sc}22;color:${sc}">${sl}</span></div>
      <div class="ar-desc">${arEsc(a.description)}</div>
      <div class="ar-tags">${tags}</div>${action}</div>`;
  }).join('')}</div>`;
}

function openAgentModal(id) {
  _arAgent = _arReg.find(a => a.id === id);
  if (!_arAgent) return;
  document.getElementById('acm-title').textContent = `${_arAgent.emoji} ${_arAgent.name} 호출`;
  document.getElementById('acm-desc').textContent  = `역할: ${_arAgent.role} — ${_arAgent.description}`;
  document.getElementById('acm-input').value = '';
  document.getElementById('acm-feedback').textContent = '';
  const btn = document.getElementById('acm-submit');
  btn.disabled = false; btn.textContent = '호출';
  document.getElementById('agent-call-modal').classList.add('open');
}
function closeAgentModal() { document.getElementById('agent-call-modal').classList.remove('open'); }

async function submitAgentCall() {
  if (!_arAgent) return;
  const task = document.getElementById('acm-input').value.trim();
  if (!task) { document.getElementById('acm-input').focus(); return; }
  const fb = document.getElementById('acm-feedback');
  const btn = document.getElementById('acm-submit');
  btn.disabled = true; btn.textContent = '전송 중…';

  // 1) same-origin(PC/Tailscale) 시도
  let sent = false;
  if (_AR_API === '') {
    try {
      const ep = _arAgent.call_endpoint || '/intake';
      const body = ep === '/chat'
        ? { message: `[에이전트룸 → ${_arAgent.name}] ${task}` }
        : { type:'agent_call', agent:_arAgent.id, task, source:'agent-room' };
      const res = await fetch(ep, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body), signal:AbortSignal.timeout(3000) });
      if (res.ok) sent = true;
    } catch(_) {}
  }

  // 2) Discord webhook 전송
  if (!sent) {
    const webhookUrl = localStorage.getItem('bucky-webhook');
    if (!webhookUrl) {
      fb.style.color='#f59e0b';
      fb.innerHTML='Discord Webhook이 설정되지 않았습니다. <a href="index.html" style="color:#7dd3fc">대시보드 설정</a>에서 Webhook URL을 입력하세요.';
      btn.disabled=false; btn.textContent='호출'; return;
    }
    const name = localStorage.getItem('bucky-wh-name') || 'Agent Room';
    const content = `[에이전트룸 → **${_arAgent.name}**] ${task}`;
    try {
      const res = await fetch(webhookUrl, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ username:name, content }) });
      if (!res.ok) throw new Error('HTTP '+res.status);
      sent = true;
    } catch(e) {
      fb.style.color='#ef4444'; fb.textContent=`Discord 전송 실패: ${e.message}`;
      btn.disabled=false; btn.textContent='다시 호출'; return;
    }
  }

  fb.style.color='#22c55e'; fb.textContent=`${_arAgent.name}에게 전달됐습니다. Discord #jh-results를 확인하세요.`;
  btn.textContent='완료 ✓'; setTimeout(closeAgentModal, 2200);
}
document.getElementById('agent-call-modal').addEventListener('click', function(e){ if(e.target===this) closeAgentModal(); });

async function loadAgentRoom() {
  renderAgents(_DEMO_AGENTS);
  try {
    const res = await fetch(_AR_API+'/agent-os/agents', { signal:AbortSignal.timeout(3500) });
    if (!res.ok) throw new Error('HTTP '+res.status);
    renderAgents(await res.json());
  } catch(_) {}
}
loadAgentRoom();
</script>
<script src="/auth-ui.js"></script>
</body>
</html>
