<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오프라인 — Bucky Agent OS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap { text-align: center; padding: 40px 20px; }
  .icon { font-size: 4rem; margin-bottom: 24px; }
  h1 { font-size: 1.5rem; color: #58a6ff; margin-bottom: 12px; }
  p { color: #8b949e; font-size: 0.95rem; line-height: 1.6; }
  .btn {
    display: inline-block;
    margin-top: 28px;
    padding: 10px 24px;
    background: #58a6ff;
    color: #0d1117;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    font-size: 0.95rem;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">📡</div>
  <h1>인터넷 연결 없음</h1>
  <p>네트워크에 연결하면 최신 데이터를 불러옵니다.<br>이전에 캐시된 페이지는 계속 사용할 수 있습니다.</p>
  <button class="btn" onclick="location.reload()">다시 시도</button>
</div>
</body>
</html>
