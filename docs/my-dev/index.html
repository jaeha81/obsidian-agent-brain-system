<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffa657">
<link rel="apple-touch-icon" href="/icons/icon-192.svg">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js');}</script>
<title>내 개발 - JH Bucky</title>
<script>
(function(){
  function getCookie(n){var v=document.cookie.split(';');for(var i=0;i<v.length;i++){var p=v[i].trim();if(p.startsWith(n+'='))return p.substring(n.length+1);}return '';}
  document.documentElement.style.visibility='hidden';
  if(!getCookie('bucky_auth')){location.replace('/login.html?r='+encodeURIComponent(location.pathname));}
  else{document.documentElement.style.visibility='';}
  if(window!==window.top){document.documentElement.classList.add('in-iframe');}
})();
</script>
<style>.in-iframe header,.in-iframe footer{display:none!important}</style>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --card-hover: #1c2333;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #ffa657;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --blue: #58a6ff;
    --purple: #bc8cff;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  header {
    background: linear-gradient(135deg, #1a1510 0%, #0d1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px; position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  header .title-block { flex: 1; }
  header h1 { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  header p { color: var(--muted); font-size: 0.8rem; margin-top: 3px; }
  .jh-nav { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .jh-nav a {
    font-size: 0.78rem; color: var(--muted); text-decoration: none;
    border: 1px solid var(--border); padding: 5px 12px; border-radius: 20px; transition: all 0.2s;
  }
  .jh-nav a:hover, .jh-nav a.active {
    border-color: var(--accent); color: var(--accent); background: rgba(255,166,87,0.08);
  }
  .stats-bar {
    display: flex; gap: 10px; padding: 14px 28px;
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .stat-box {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 16px; flex: 1; min-width: 88px; text-align: center; transition: all 0.2s;
  }
  .stat-box:hover { border-color: var(--accent); }
  .stat-box .num { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .stat-box .lbl { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
  .toolbar {
    padding: 10px 28px; display: flex; gap: 8px; flex-wrap: wrap;
    align-items: center; border-bottom: 1px solid var(--border);
  }
  .btn {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 0.82rem; transition: all 0.2s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #0d1117; border-color: var(--accent); font-weight: 600; }
  .btn.primary:hover { opacity: 0.85; color: #0d1117; }
  .live-indicator {
    margin-left: auto; display: flex; align-items: center; gap: 6px;
    font-size: 0.76rem; color: var(--muted);
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green);
    box-shadow: 0 0 5px var(--green); animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .input-bar { margin: 14px 28px; display: flex; gap: 8px; }
  .input-bar textarea {
    flex: 1; background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; resize: none; height: 72px;
    font-family: inherit;
  }
  .input-bar textarea:focus { outline: none; border-color: var(--accent); }
  .input-bar-actions { display: flex; flex-direction: column; gap: 6px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; padding: 18px 28px; }
  .project-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 18px; border-left: 3px solid transparent; transition: all 0.2s;
    cursor: pointer;
  }
  .project-card:hover { border-color: #444d56; transform: translateY(-1px); }
  .project-card.s-active   { border-left-color: var(--green); }
  .project-card.s-planning { border-left-color: var(--yellow); }
  .project-card.s-paused   { border-left-color: var(--muted); }
  .project-card.s-done     { border-left-color: var(--blue); opacity: 0.7; }

  .card-header { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 10px; }
  .stack-badge {
    font-size: 0.68rem; padding: 3px 7px; border-radius: 4px;
    background: rgba(255,166,87,0.12); color: var(--accent); border: 1px solid rgba(255,166,87,0.25);
    font-weight: 600; flex-shrink: 0;
  }
  .card-title { flex: 1; }
  .card-title strong { font-size: 0.95rem; font-weight: 600; display: block; }
  .card-title small { font-size: 0.74rem; color: var(--muted); margin-top: 2px; display: block; }
  .status-pill {
    font-size: 0.7rem; padding: 3px 9px; border-radius: 10px; font-weight: 600; flex-shrink: 0;
  }
  .sp-active   { background: rgba(63,185,80,0.15);   color: var(--green); }
  .sp-planning { background: rgba(210,153,34,0.15);  color: var(--yellow); }
  .sp-paused   { background: rgba(139,148,158,0.15); color: var(--muted); }
  .sp-done     { background: rgba(88,166,255,0.12);  color: var(--blue); }

  .card-desc { font-size: 0.81rem; color: var(--muted); line-height: 1.5; margin-bottom: 12px; }

  .progress-bar { height: 4px; background: rgba(48,54,61,0.8); border-radius: 2px; margin-bottom: 12px; }
  .progress-fill { height: 4px; border-radius: 2px; background: var(--accent); transition: width 0.4s; }

  .card-meta { font-size: 0.74rem; color: var(--muted); margin-bottom: 10px; line-height: 1.6; }
  .card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .act-btn {
    font-size: 0.76rem; padding: 4px 11px; border-radius: 5px; cursor: pointer;
    border: 1px solid; transition: all 0.15s; font-weight: 500; background: transparent;
  }
  .a-code    { color: var(--blue);   border-color: rgba(88,166,255,0.3); }
  .a-code:hover    { background: rgba(88,166,255,0.1); }
  .a-review  { color: var(--purple); border-color: rgba(188,140,255,0.3); }
  .a-review:hover  { background: rgba(188,140,255,0.1); }
  .a-plan    { color: var(--accent); border-color: rgba(255,166,87,0.3); }
  .a-plan:hover    { background: rgba(255,166,87,0.1); }
  .a-pause   { color: var(--muted);  border-color: rgba(139,148,158,0.3); }
  .a-pause:hover   { background: rgba(139,148,158,0.1); }

  .empty-state { padding: 60px 28px; text-align: center; color: var(--muted); }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 8px; }
  .empty-state p { font-size: 0.88rem; }

  footer { padding: 18px 28px; text-align: center; color: var(--muted); font-size: 0.78rem; border-top: 1px solid var(--border); margin-top: 20px; }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<header>
  <div class="title-block">
    <h1>내 개발</h1>
    <p>사용자 자체 사이드 프로젝트 — 기획부터 배포까지</p>
  </div>
  <nav class="jh-nav">
    <a href="/repo/">레포대시보드</a>
    <a href="/wishket/">위시켓</a>
    <a href="/daily-plus/">오늘의플러스</a>
    <a href="/task-board/">태스크보드</a>
    <a href="/claude-code/">클로드코드</a>
    <a href="/codex/">Codex</a>
    <a href="/my-dev/" class="active">내 개발</a>
    <a href="/bucky-agent-os.html">BuckyOS</a>
    <a href="/api/logout" class="auth-end">로그아웃</a>
  </nav>
</header>

<div class="stats-bar">
  <div class="stat-box"><div class="num" id="statTotal">0</div><div class="lbl">전체 프로젝트</div></div>
  <div class="stat-box"><div class="num" id="statActive" style="color:var(--green)">0</div><div class="lbl">진행중</div></div>
  <div class="stat-box"><div class="num" id="statPlanning" style="color:var(--yellow)">0</div><div class="lbl">기획중</div></div>
  <div class="stat-box"><div class="num" id="statDone" style="color:var(--blue)">0</div><div class="lbl">완료</div></div>
</div>

<div class="toolbar">
  <button class="btn primary" onclick="showInput()">+ 새 프로젝트 아이디어</button>
  <button class="btn" onclick="refresh()">새로고침</button>
  <div class="live-indicator">
    <span class="live-dot"></span>
    <span id="lastUpdate">로딩 중...</span>
  </div>
</div>

<div class="input-bar" id="inputBar" style="display:none">
  <textarea id="ideaInput" placeholder="프로젝트 아이디어를 자유롭게 입력하세요...&#10;예: 유튜브 자막 자동 요약 → Obsidian 저장 도구 (Python + yt-dlp)"></textarea>
  <div class="input-bar-actions">
    <button class="btn primary" onclick="submitIdea()">전송</button>
    <button class="btn" onclick="hideInput()">취소</button>
  </div>
</div>

<div id="projectGrid" class="grid">
  <div class="empty-state">
    <div class="icon">🛠️</div>
    <p>사이드 프로젝트 없음<br><small>위 버튼으로 아이디어를 전송하거나<br>Discord #jh-내개발 채널에서 대화하세요</small></p>
  </div>
</div>

<footer>Bucky Agent OS — 내 개발 프로젝트 에이전트 · <a href="/bucky-agent-os.html">OS 대시보드</a> · <a href="/task-board/">태스크보드</a></footer>

<script>
const INTAKE = '/intake';
let projects = [];

async function loadProjects() {
  try {
    const r = await fetch('/api/my-projects', { credentials: 'include' });
    if (r.ok) {
      const d = await r.json();
      projects = d.projects || [];
      renderProjects();
      updateStats();
    }
  } catch(e) {
    console.warn('프로젝트 로드 실패 (서버 미연결 시 정상):', e.message);
  }
  document.getElementById('lastUpdate').textContent = '최종 갱신: ' + new Date().toLocaleTimeString('ko-KR');
}

function updateStats() {
  document.getElementById('statTotal').textContent = projects.length;
  document.getElementById('statActive').textContent = projects.filter(p => p.status === 'active').length;
  document.getElementById('statPlanning').textContent = projects.filter(p => p.status === 'planning').length;
  document.getElementById('statDone').textContent = projects.filter(p => p.status === 'done').length;
}

function renderProjects() {
  const grid = document.getElementById('projectGrid');
  if (!projects.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🛠️</div><p>사이드 프로젝트 없음<br><small>위 버튼으로 아이디어를 전송하거나<br>Discord #jh-내개발 채널에서 대화하세요</small></p></div>`;
    return;
  }
  grid.innerHTML = projects.map(p => `
    <div class="project-card s-${p.status || 'planning'}">
      <div class="card-header">
        <span class="stack-badge">${escHtml(p.stack || 'DEV')}</span>
        <div class="card-title">
          <strong>${escHtml(p.name || '미명명 프로젝트')}</strong>
          <small>${escHtml(p.id || '')}</small>
        </div>
        <span class="status-pill sp-${p.status || 'planning'}">${statusLabel(p.status)}</span>
      </div>
      ${p.description ? `<div class="card-desc">${escHtml(p.description)}</div>` : ''}
      ${p.progress !== undefined ? `
        <div class="progress-bar"><div class="progress-fill" style="width:${p.progress}%"></div></div>
      ` : ''}
      <div class="card-meta">
        ${p.created ? `<div>생성: ${escHtml(p.created)}</div>` : ''}
        ${p.updated ? `<div>수정: ${escHtml(p.updated)}</div>` : ''}
        ${p.tech ? `<div>기술: ${escHtml(p.tech)}</div>` : ''}
      </div>
      <div class="card-actions">
        <button class="act-btn a-code" onclick="delegateCode('${escHtml(p.id)}', '${escHtml(p.name||'')}')">Claude Code 위임</button>
        <button class="act-btn a-review" onclick="delegateReview('${escHtml(p.id)}', '${escHtml(p.name||'')}')">Codex 검수</button>
        <button class="act-btn a-plan" onclick="requestPlan('${escHtml(p.id)}', '${escHtml(p.name||'')}')">기획 재검토</button>
        ${p.status === 'active' ? `<button class="act-btn a-pause" onclick="pauseProject('${escHtml(p.id)}')">일시중지</button>` : ''}
      </div>
    </div>
  `).join('');
}

function statusLabel(s) {
  return { active: '진행중', planning: '기획중', paused: '중단', done: '완료' }[s] || '기획중';
}
function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showInput() {
  document.getElementById('inputBar').style.display = 'flex';
  document.getElementById('ideaInput').focus();
}
function hideInput() { document.getElementById('inputBar').style.display = 'none'; }

async function submitIdea() {
  const text = document.getElementById('ideaInput').value.trim();
  if (!text) return;
  await sendPayload({
    action: 'mydev_new_idea',
    target_channel: 'jh-내개발',
    content: text,
  });
  document.getElementById('ideaInput').value = '';
  hideInput();
  alert('아이디어가 전송되었습니다. Bucky가 기획안을 작성해드립니다.');
  setTimeout(loadProjects, 2000);
}

async function delegateCode(id, name) {
  await sendPayload({ action: 'mydev_delegate_code', project_id: id,
    target_channel: 'jh-클로드코드앱', content: `프로젝트 "${name}" 구현 위임` });
  alert(`"${name}" → Claude Code 위임 완료`);
}
async function delegateReview(id, name) {
  await sendPayload({ action: 'mydev_delegate_review', project_id: id,
    target_channel: 'jh-코덱스앱', content: `프로젝트 "${name}" 코드 검수 요청` });
  alert(`"${name}" → Codex 검수 요청 완료`);
}
async function requestPlan(id, name) {
  await sendPayload({ action: 'mydev_replan', project_id: id,
    content: `프로젝트 "${name}" 기획 재검토 요청` });
  alert('기획 재검토 요청 전송 완료');
}
async function pauseProject(id) {
  await sendPayload({ action: 'mydev_pause', project_id: id });
  await loadProjects();
}

async function sendPayload(extra) {
  const payload = { source: 'mydev-dashboard', source_dashboard_url: location.href, ...extra };
  try {
    await fetch(INTAKE, {
      method: 'POST', credentials: 'include',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
  } catch(e) { console.warn('전송 실패:', e.message); }
}

function refresh() { loadProjects(); }

loadProjects();
setInterval(loadProjects, 30000);
</script>
</body>
</html>
