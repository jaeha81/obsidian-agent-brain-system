<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>협업문의 관리자</title>
<style>
  :root{--bg:#f4f6f8;--surface:#fff;--ink:#111827;--muted:#6b7280;--line:#d1d5db;--accent:#0f766e;--accent-2:#1d4ed8;--warn:#b45309}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink)}
  header{padding:20px 24px;background:#0f172a;color:#fff}
  h1{margin:0;font-size:24px}
  .sub{margin-top:8px;color:#cbd5e1;font-size:13px}
  .wrap{padding:24px;display:grid;gap:20px}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:18px}
  .login{max-width:420px;margin:40px auto}
  .login input,.note textarea,.toolbar input,.toolbar select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px}
  .btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:10px 14px;font-size:14px;cursor:pointer}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.alt{background:var(--accent-2);border-color:var(--accent-2);color:#fff}
  .btn.warn{background:#fff7ed;border-color:#fed7aa;color:var(--warn)}
  .layout{display:grid;grid-template-columns:320px 1fr;gap:20px}
  .list{display:grid;gap:10px;max-height:70vh;overflow:auto}
  .item{padding:12px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:#fff}
  .item.active{border-color:var(--accent-2);box-shadow:0 0 0 2px rgba(29,78,216,.1)}
  .meta{font-size:12px;color:var(--muted);margin-top:4px}
  .badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:11px;background:#ecfeff;color:#155e75}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .detail pre{white-space:pre-wrap;background:#f9fafb;border:1px solid var(--line);border-radius:8px;padding:12px;font-size:13px}
  .actions{display:flex;flex-wrap:wrap;gap:10px}
  .note textarea{min-height:120px;resize:vertical}
  [hidden]{display:none !important}
  @media (max-width:900px){.layout{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>협업문의 관리자</h1>
  <div class="sub">문의 상세 + 메모 + 상태변경 + Discord 전송 + 개발요청 실행 + Codex 검수 요청</div>
</header>

<main class="wrap">
  <section class="panel login" id="collab-admin-login">
    <h2 style="margin-top:0">관리자 로그인</h2>
    <p style="color:var(--muted);font-size:13px">비밀번호 입력 후 관리자 화면을 엽니다.</p>
    <input id="collab-admin-password" type="password" placeholder="비밀번호">
    <div style="margin-top:12px;display:flex;gap:10px">
      <button class="btn primary" onclick="unlockCollabAdmin()">로그인</button>
      <a class="btn" href="bni-proposal.html" style="text-decoration:none;color:inherit">공개 페이지로</a>
    </div>
    <div id="collab-admin-login-msg" style="margin-top:10px;color:var(--warn);font-size:13px"></div>
  </section>

  <section class="layout" id="collab-admin-app" hidden>
    <aside class="panel">
      <div class="toolbar" style="display:grid;gap:10px">
        <input id="collab-search" placeholder="이름, 회사, 요약 검색">
        <select id="collab-status-filter">
          <option value="all">전체 상태</option>
          <option value="new">new</option>
          <option value="reviewing">reviewing</option>
          <option value="proposal_in_progress">proposal_in_progress</option>
          <option value="approved">approved</option>
          <option value="development_requested">development_requested</option>
          <option value="done">done</option>
          <option value="rejected">rejected</option>
        </select>
      </div>
      <div class="list" id="collab-inquiry-list" style="margin-top:14px"></div>
    </aside>

    <section class="panel detail">
      <div class="grid">
        <div>
          <div class="meta">상태</div>
          <div><span class="badge" id="collab-detail-status">new</span></div>
        </div>
        <div>
          <div class="meta">요청 ID</div>
          <div id="collab-detail-id">-</div>
        </div>
        <div>
          <div class="meta">요청자</div>
          <div id="collab-detail-name">-</div>
        </div>
        <div>
          <div class="meta">이메일</div>
          <div id="collab-detail-email">-</div>
        </div>
        <div>
          <div class="meta">회사</div>
          <div id="collab-detail-company">-</div>
        </div>
        <div>
          <div class="meta">예산</div>
          <div id="collab-detail-budget">-</div>
        </div>
      </div>

      <div style="margin-top:16px">
        <div class="meta">요약</div>
        <div id="collab-detail-summary" style="font-weight:700;margin-top:4px">-</div>
      </div>

      <div style="margin-top:16px">
        <div class="meta">상세 내용</div>
        <pre id="collab-detail-body">-</pre>
      </div>

      <div class="note" style="margin-top:16px">
        <div class="meta">관리자 메모</div>
        <textarea id="collab-admin-note" placeholder="메모를 남기세요"></textarea>
        <div style="margin-top:10px;display:flex;gap:10px">
          <button class="btn" onclick="saveCollabAdminNote()">메모 저장</button>
          <select id="collab-status-next">
            <option value="new">new</option>
            <option value="reviewing">reviewing</option>
            <option value="proposal_in_progress">proposal_in_progress</option>
            <option value="approved">approved</option>
            <option value="development_requested">development_requested</option>
            <option value="done">done</option>
            <option value="rejected">rejected</option>
          </select>
          <button class="btn" onclick="updateCollabStatus()">상태 변경</button>
        </div>
      </div>

      <div style="margin-top:16px">
        <div class="meta">작업 액션</div>
        <div class="actions" style="margin-top:10px">
          <button class="btn" onclick="dispatchCollabDiscord()">Discord 전송</button>
          <button class="btn alt" onclick="startCollabProposal()">제안서 시작</button>
          <button class="btn primary" onclick="dispatchCollabDevelopmentRequest()">개발요청 실행</button>
          <button class="btn warn" onclick="requestCollabCodexReview()">Codex 검수 요청</button>
        </div>
        <div id="collab-admin-action-msg" style="margin-top:10px;color:var(--muted);font-size:13px"></div>
      </div>
    </section>
  </section>
</main>

<script>
const COLLAB_ADMIN_PASSWORD='ljh911314';
const COLLAB_ADMIN_AUTH_KEY='collab-admin-auth';
const LOCAL_INQUIRIES_KEY='collab-inquiries-local';
const COLLAB_API_URL='http://127.0.0.1:8765/collab/inquiries';
let collabSelectedRequestId='';
let collabItems=[];

function collabAuthHeaders(){
  return {
    'Content-Type':'application/json',
    'X-Collab-Admin-Password':sessionStorage.getItem(COLLAB_ADMIN_AUTH_KEY)||'',
  };
}

function setCollabMessage(text,isError=false){
  const el=document.getElementById('collab-admin-action-msg');
  if(!el)return;
  el.textContent=text||'';
  el.style.color=isError?'#b45309':'var(--muted)';
}

function unlockCollabAdmin(){
  const value=document.getElementById('collab-admin-password').value;
  const msg=document.getElementById('collab-admin-login-msg');
  if(value!==COLLAB_ADMIN_PASSWORD){
    msg.textContent='비밀번호가 올바르지 않습니다.';
    return;
  }
  sessionStorage.setItem(COLLAB_ADMIN_AUTH_KEY,value);
  msg.textContent='';
  renderCollabAdmin();
}

function getLocalCollabInquiries(){
  try{return JSON.parse(localStorage.getItem(LOCAL_INQUIRIES_KEY)||'[]')}catch(_err){return []}
}

function saveLocalCollabInquiries(items){
  localStorage.setItem(LOCAL_INQUIRIES_KEY,JSON.stringify(items));
}

function currentCollabItems(){
  return collabItems.length?collabItems:getLocalCollabInquiries();
}

async function fetchCollabInquiries(){
  const response=await fetch(COLLAB_API_URL,{headers:collabAuthHeaders()});
  if(!response.ok){
    throw new Error(`inquiry_list_${response.status}`);
  }
  const data=await response.json();
  collabItems=Array.isArray(data.items)?data.items:[];
  saveLocalCollabInquiries(collabItems);
  return collabItems;
}

async function postCollabAction(path,payload={}){
  const response=await fetch(`${COLLAB_API_URL}/${path}`,{
    method:'POST',
    headers:collabAuthHeaders(),
    body:JSON.stringify(payload),
  });
  const data=await response.json().catch(()=>({}));
  if(!response.ok){
    throw new Error(data.error||`request_failed_${response.status}`);
  }
  return data;
}

async function renderCollabAdmin(){
  const authed=sessionStorage.getItem(COLLAB_ADMIN_AUTH_KEY)===COLLAB_ADMIN_PASSWORD;
  document.getElementById('collab-admin-login').hidden=authed;
  document.getElementById('collab-admin-app').hidden=!authed;
  if(!authed)return;
  try{
    await fetchCollabInquiries();
    setCollabMessage('협업 문의 목록을 불러왔습니다.');
  }catch(_err){
    collabItems=getLocalCollabInquiries();
    setCollabMessage('서버 연결이 안 되어 로컬 임시 목록을 보여줍니다.',true);
  }
  renderCollabList();
}

function fillCollabDetail(item){
  document.getElementById('collab-detail-status').textContent=item?.status||'new';
  document.getElementById('collab-detail-id').textContent=item?.request_id||'-';
  document.getElementById('collab-detail-name').textContent=item?.name||item?.requester_name||'-';
  document.getElementById('collab-detail-email').textContent=item?.email||item?.requester_email||'-';
  document.getElementById('collab-detail-company').textContent=item?.company||'-';
  document.getElementById('collab-detail-budget').textContent=item?.budget||'-';
  document.getElementById('collab-detail-summary').textContent=item?.summary||'-';
  document.getElementById('collab-detail-body').textContent=item?.body||'-';
  document.getElementById('collab-admin-note').value=item?.admin_notes||item?.admin_note||'';
  document.getElementById('collab-status-next').value=item?.status||'new';
}

function renderCollabList(){
  const list=document.getElementById('collab-inquiry-list');
  const search=(document.getElementById('collab-search').value||'').trim().toLowerCase();
  const statusFilter=document.getElementById('collab-status-filter').value;
  const items=currentCollabItems().filter(item=>{
    const matchesStatus=statusFilter==='all'||(item.status||'new')===statusFilter;
    const haystack=[item.name,item.requester_name,item.company,item.summary,item.email,item.requester_email].join(' ').toLowerCase();
    const matchesSearch=!search||haystack.includes(search);
    return matchesStatus&&matchesSearch;
  });
  list.innerHTML='';
  if(!items.length){
    list.innerHTML='<div class="item">조건에 맞는 문의가 없습니다.</div>';
    fillCollabDetail(null);
    return;
  }
  items.forEach((item,idx)=>{
    const isSelected=collabSelectedRequestId?item.request_id===collabSelectedRequestId:idx===0;
    const el=document.createElement('button');
    el.type='button';
    el.className='item'+(isSelected?' active':'');
    el.innerHTML=`<div style="font-weight:700">${item.summary||'(요약 없음)'}</div><div class="meta">${item.name||item.requester_name||item.company||'-'} · ${item.status||'new'}</div>`;
    el.onclick=()=>selectCollabInquiry(item.request_id);
    list.appendChild(el);
  });
  if(!items.some(item=>item.request_id===collabSelectedRequestId)){
    collabSelectedRequestId=items[0].request_id;
  }
  selectCollabInquiry(collabSelectedRequestId,false);
}

function selectCollabInquiry(requestId,rerender=true){
  collabSelectedRequestId=requestId;
  const item=currentCollabItems().find(x=>x.request_id===requestId)||null;
  fillCollabDetail(item);
  if(rerender){renderCollabList()}
}

async function refreshCollabList(successText=''){
  try{
    await fetchCollabInquiries();
  }catch(_err){
    collabItems=getLocalCollabInquiries();
  }
  renderCollabList();
  if(successText){setCollabMessage(successText)}
}

async function saveCollabAdminNote(){
  if(!collabSelectedRequestId)return;
  try{
    await postCollabAction(`${collabSelectedRequestId}/note`,{note:document.getElementById('collab-admin-note').value.trim()});
    await refreshCollabList('관리자 메모를 저장했습니다.');
  }catch(err){
    setCollabMessage(`메모 저장 실패: ${err.message}`,true);
  }
}

async function updateCollabStatus(){
  if(!collabSelectedRequestId)return;
  try{
    await postCollabAction(`${collabSelectedRequestId}/status`,{status:document.getElementById('collab-status-next').value});
    await refreshCollabList('상태를 업데이트했습니다.');
  }catch(err){
    setCollabMessage(`상태 변경 실패: ${err.message}`,true);
  }
}

async function dispatchCollabDiscord(){
  if(!collabSelectedRequestId)return;
  try{
    await postCollabAction(`${collabSelectedRequestId}/discord-dispatch`);
    await refreshCollabList('협업 문의를 Discord intake로 전송했습니다.');
  }catch(err){
    setCollabMessage(`Discord 전송 실패: ${err.message}`,true);
  }
}

async function startCollabProposal(){
  if(!collabSelectedRequestId)return;
  try{
    await postCollabAction(`${collabSelectedRequestId}/proposal-start`);
    await refreshCollabList('제안서 시작 요청을 Discord/Bucky 루프로 보냈습니다.');
  }catch(err){
    setCollabMessage(`제안서 시작 실패: ${err.message}`,true);
  }
}

async function dispatchCollabDevelopmentRequest(){
  if(!collabSelectedRequestId)return;
  try{
    await postCollabAction(`${collabSelectedRequestId}/development-request`);
    await refreshCollabList('개발요청을 Claude/Codex 루프로 생성했습니다.');
  }catch(err){
    setCollabMessage(`개발요청 실패: ${err.message}`,true);
  }
}

async function requestCollabCodexReview(){
  if(!collabSelectedRequestId)return;
  try{
    await postCollabAction(`${collabSelectedRequestId}/codex-review`);
    await refreshCollabList('Codex 검수 요청을 생성했습니다.');
  }catch(err){
    setCollabMessage(`Codex 검수 요청 실패: ${err.message}`,true);
  }
}

document.getElementById('collab-search').addEventListener('input',renderCollabList);
document.getElementById('collab-status-filter').addEventListener('change',renderCollabList);

renderCollabAdmin();
</script>
</body>
</html>
