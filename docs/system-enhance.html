<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시스템강화 — JH</title>
<script>
(function(){
  function getCookie(n){var v=document.cookie.split(';');for(var i=0;i<v.length;i++){var p=v[i].trim();if(p.startsWith(n+'='))return p.substring(n.length+1);}return '';}
  document.documentElement.style.visibility='hidden';
  if(!getCookie('bucky_auth')){location.replace('/login.html?r='+encodeURIComponent(location.pathname));}
  else{document.documentElement.style.visibility='';}
})();
</script>
<style>
:root{
  --bg:#07100d;--bg2:#0a150f;--card:#0e1f17;--card2:#112519;
  --border:#1a3a28;--border2:#1f4a32;
  --accent:#f97316;--accent2:#3b82f6;
  --purple:#a855f7;--purple2:#7c3aed;
  --text:#e2e8f0;--dim:#94a3b8;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:"Segoe UI",system-ui,sans-serif;font-size:13px}

/* NAV */
nav.jh-nav{
  display:flex;flex-wrap:wrap;gap:4px;
  padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100
}
nav.jh-nav a{
  padding:5px 12px;border-radius:6px;border:1px solid transparent;
  color:var(--dim);text-decoration:none;font-size:12px;font-weight:500;transition:all .15s
}
nav.jh-nav a:hover{color:var(--text);border-color:var(--border2);background:var(--card)}
nav.jh-nav a.active{color:var(--text);border-color:var(--border2);background:var(--card2)}
nav.jh-nav a[href*="system-enhance"]{color:var(--purple) !important;border-color:rgba(168,85,247,.3)}
nav.jh-nav a[href*="system-enhance"]:hover,
nav.jh-nav a[href*="system-enhance"].active{background:rgba(168,85,247,.12) !important;border-color:rgba(168,85,247,.5) !important}

/* LAYOUT */
.page-wrap{max-width:1100px;margin:0 auto;padding:24px 16px 48px}

/* HERO */
.hero{
  background:linear-gradient(135deg,rgba(168,85,247,.15),rgba(124,58,237,.08));
  border:1px solid rgba(168,85,247,.25);border-radius:12px;
  padding:28px 24px 22px;margin-bottom:24px;position:relative;overflow:hidden
}
.hero::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(168,85,247,.12),transparent 70%);pointer-events:none
}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:3px 10px;border-radius:99px;
  background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.3);
  color:var(--purple);font-size:10px;font-weight:700;letter-spacing:.8px;
  margin-bottom:10px
}
.badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.badge-dot.on{background:var(--green);box-shadow:0 0 4px var(--green)}
.hero h1{font-size:22px;font-weight:800;color:var(--text);margin-bottom:6px}
.hero p{color:var(--dim);font-size:13px;line-height:1.6;max-width:560px}
.hero-meta{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap}
.hero-meta span{font-size:11px;color:var(--dim)}
.hero-meta strong{color:var(--text)}

/* SECTION */
.section-title{
  font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--dim);margin-bottom:10px;padding-bottom:6px;
  border-bottom:1px solid var(--border)
}
.section+.section{margin-top:28px}

/* PHASE TRACK */
.phase-track{display:flex;gap:0;margin-bottom:8px}
.phase-item{
  flex:1;padding:12px 14px;background:var(--card);border:1px solid var(--border);
  position:relative
}
.phase-item:first-child{border-radius:8px 0 0 8px}
.phase-item:last-child{border-radius:0 8px 8px 0}
.phase-item+.phase-item{border-left:none}
.phase-item.active{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.3)}
.phase-item.done{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.2)}
.phase-label{font-size:11px;font-weight:700;color:var(--text);margin-bottom:3px}
.phase-date{font-size:10px;color:var(--dim)}
.phase-status-tag{
  display:inline-block;padding:2px 7px;border-radius:4px;
  font-size:9px;font-weight:700;letter-spacing:.5px;margin-top:6px
}
.phase-status-tag.active{background:rgba(168,85,247,.2);color:var(--purple)}
.phase-status-tag.pending{background:rgba(148,163,184,.1);color:var(--dim)}
.phase-status-tag.done{background:rgba(34,197,94,.15);color:var(--green)}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.kpi-card{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;
  transition:border-color .15s
}
.kpi-card:hover{border-color:var(--border2)}
.kpi-check{
  width:20px;height:20px;border-radius:5px;border:2px solid var(--border2);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s
}
.kpi-check.checked{background:var(--green);border-color:var(--green)}
.kpi-check.checked::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.kpi-info{flex:1;min-width:0}
.kpi-label{font-size:12px;color:var(--text);font-weight:500}
.kpi-due{font-size:10px;color:var(--dim);margin-top:2px}
.kpi-card.checked-card .kpi-label{text-decoration:line-through;color:var(--dim)}

/* TASK LISTS */
.task-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:620px){.task-cols{grid-template-columns:1fr}}
.task-list{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px}
.task-list-title{font-size:11px;font-weight:700;color:var(--dim);letter-spacing:.6px;margin-bottom:10px}
.task-list ul{list-style:none;display:flex;flex-direction:column;gap:6px}
.task-list li{
  display:flex;align-items:flex-start;gap:8px;
  font-size:12px;color:var(--text);line-height:1.5
}
.task-list li::before{
  content:'→';color:var(--purple);font-size:11px;font-weight:700;
  flex-shrink:0;margin-top:1px
}

/* TOP10 TABLE */
.top10-table{width:100%;border-collapse:collapse}
.top10-table th{
  padding:8px 10px;text-align:left;font-size:10px;font-weight:700;
  letter-spacing:.8px;color:var(--dim);border-bottom:1px solid var(--border);
  text-transform:uppercase
}
.top10-table td{
  padding:9px 10px;font-size:12px;color:var(--text);
  border-bottom:1px solid var(--border)
}
.top10-table tr:last-child td{border-bottom:none}
.top10-table tr:hover td{background:var(--card2)}
.rank-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:5px;
  background:rgba(168,85,247,.15);color:var(--purple);
  font-size:11px;font-weight:800
}
.diff{font-size:12px}
.start-btn{
  display:inline-block;padding:3px 8px;border-radius:4px;
  background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.2);
  color:var(--accent);font-size:10px;font-weight:600;cursor:default
}

/* FOOTER */
.page-footer{
  margin-top:32px;padding-top:16px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px
}
.page-footer span{font-size:11px;color:var(--dim)}
.review-pills{display:flex;gap:8px;flex-wrap:wrap}
.review-pill{
  padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;
  background:var(--card);border:1px solid var(--border);color:var(--dim)
}
.review-pill strong{color:var(--text)}
</style>
<script src="/shared/auth.js"></script>
</head>
<body>

<nav class="jh-nav"></nav>

<div class="page-wrap">

  <!-- HERO -->
  <div class="hero" id="hero">
    <div class="hero-badge">
      <div class="badge-dot on"></div>
      SYSTEM ENHANCE · ACTIVE
    </div>
    <h1>시스템강화 현황판</h1>
    <p id="hero-summary">현재 활성화된 시스템강화 이니셔티브의 진행 상태와 오늘 할 일을 확인합니다.</p>
    <div class="hero-meta" id="hero-meta">
      <span>시작일 <strong>—</strong></span>
      <span>30일 리뷰 <strong>—</strong></span>
      <span>90일 리뷰 <strong>—</strong></span>
      <span>최종 업데이트 <strong>—</strong></span>
    </div>
  </div>

  <!-- PHASES -->
  <div class="section">
    <div class="section-title">진행 단계</div>
    <div class="phase-track" id="phase-track"></div>
  </div>

  <!-- KPI CHECKLIST -->
  <div class="section">
    <div class="section-title">목표 체크리스트</div>
    <div class="kpi-grid" id="kpi-grid"></div>
  </div>

  <!-- TODAY + THIS WEEK -->
  <div class="section">
    <div class="section-title">실행 태스크</div>
    <div class="task-cols">
      <div class="task-list">
        <div class="task-list-title">오늘 바로 할 일</div>
        <ul id="today-tasks"></ul>
      </div>
      <div class="task-list">
        <div class="task-list-title">이번 주 안에 끝낼 일</div>
        <ul id="week-tasks"></ul>
      </div>
    </div>
  </div>

  <!-- TOP 10 -->
  <div class="section">
    <div class="section-title">최종 우선순위 TOP 10</div>
    <table class="top10-table">
      <thead>
        <tr>
          <th>#</th>
          <th>행동</th>
          <th>난이도</th>
          <th>시간</th>
          <th>지금 시작</th>
        </tr>
      </thead>
      <tbody id="top10-body"></tbody>
    </table>
  </div>

  <!-- FOOTER -->
  <div class="page-footer">
    <span id="footer-updated">데이터 기준: —</span>
    <div class="review-pills">
      <div class="review-pill">30일 리뷰 <strong id="pill-30d">—</strong></div>
      <div class="review-pill">90일 리뷰 <strong id="pill-90d">—</strong></div>
    </div>
  </div>

</div>

<script src="/shared/nav.js"></script>
<script>
(function(){
  const KPI_KEY = 'se_kpi_v1';

  function loadKpiState(){
    try{ return JSON.parse(localStorage.getItem(KPI_KEY)||'{}'); }catch(e){ return {}; }
  }
  function saveKpiState(s){ localStorage.setItem(KPI_KEY, JSON.stringify(s)); }

  function phaseStatusTag(s){
    if(s==='in_progress') return '<span class="phase-status-tag active">진행중</span>';
    if(s==='done')        return '<span class="phase-status-tag done">완료</span>';
    return '<span class="phase-status-tag pending">대기</span>';
  }

  function render(d){
    const ini = d.initiatives[0];

    // Hero
    document.getElementById('hero-summary').textContent = ini.summary;
    document.getElementById('hero-meta').innerHTML =
      '<span>시작일 <strong>'+ini.started+'</strong></span>' +
      '<span>30일 리뷰 <strong>'+ini.review_30d+'</strong></span>' +
      '<span>90일 리뷰 <strong>'+ini.review_90d+'</strong></span>' +
      '<span>최종 업데이트 <strong>'+d.meta.last_updated+'</strong></span>';

    // Phases
    document.getElementById('phase-track').innerHTML = ini.phases.map(function(p){
      var cls = p.status==='in_progress'?'active':(p.status==='done'?'done':'');
      return '<div class="phase-item '+cls+'">'+
        '<div class="phase-label">'+p.label+'</div>'+
        '<div class="phase-date">'+p.start+' ~ '+p.end+'</div>'+
        phaseStatusTag(p.status)+
        '</div>';
    }).join('');

    // KPI
    var kpiState = loadKpiState();
    document.getElementById('kpi-grid').innerHTML = ini.kpis.map(function(k,i){
      var isDone = kpiState['k'+i] || k.done;
      return '<div class="kpi-card'+(isDone?' checked-card':'')+'" id="kc'+i+'">'+
        '<div class="kpi-check'+(isDone?' checked':'')+'" onclick="toggleKpi('+i+')"></div>'+
        '<div class="kpi-info">'+
          '<div class="kpi-label">'+k.label+'</div>'+
          '<div class="kpi-due">마감 '+k.due+'</div>'+
        '</div>'+
        '</div>';
    }).join('');

    // Today tasks
    document.getElementById('today-tasks').innerHTML =
      d.today_tasks.map(function(t){ return '<li>'+t+'</li>'; }).join('');

    // Week tasks
    document.getElementById('week-tasks').innerHTML =
      d.this_week_tasks.map(function(t){ return '<li>'+t+'</li>'; }).join('');

    // Top 10
    document.getElementById('top10-body').innerHTML =
      d.top10_priority.map(function(r){
        return '<tr>'+
          '<td><span class="rank-badge">'+r.rank+'</span></td>'+
          '<td>'+r.action+'</td>'+
          '<td class="diff">'+r.difficulty+'</td>'+
          '<td style="color:var(--dim)">'+r.time_needed+'</td>'+
          '<td><span class="start-btn">'+r.start_now+'</span></td>'+
          '</tr>';
      }).join('');

    // Footer
    document.getElementById('footer-updated').textContent = '데이터 기준: '+d.meta.last_updated;
    document.getElementById('pill-30d').textContent = ini.review_30d;
    document.getElementById('pill-90d').textContent = ini.review_90d;
  }

  window.toggleKpi = function(i){
    var state = loadKpiState();
    state['k'+i] = !state['k'+i];
    saveKpiState(state);
    var card = document.getElementById('kc'+i);
    var check = card.querySelector('.kpi-check');
    var label = card.querySelector('.kpi-label');
    if(state['k'+i]){
      card.classList.add('checked-card');
      check.classList.add('checked');
    } else {
      card.classList.remove('checked-card');
      check.classList.remove('checked');
    }
  };

  fetch('/data/system_enhance.json?t='+Date.now())
    .then(function(r){ return r.json(); })
    .then(render)
    .catch(function(e){
      document.getElementById('hero-summary').textContent =
        '데이터 로드 실패: '+e.message+' — JSON 경로를 확인하세요.';
    });
})();
</script>
</body>
</html>
