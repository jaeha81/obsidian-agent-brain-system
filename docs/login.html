<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bucky Agent OS — 로그인</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    background: #0a0f1e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-wrap {
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  .brand {
    text-align: center;
    margin-bottom: 32px;
  }
  .brand-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #1a3a6b, #2563eb);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    margin: 0 auto 16px;
    box-shadow: 0 8px 32px rgba(37,99,235,0.35);
  }
  .brand h1 {
    color: #e2e8f0;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .brand p {
    color: #64748b;
    font-size: 0.85rem;
    margin-top: 4px;
  }

  .card {
    background: #111827;
    border: 1px solid #1e293b;
    border-radius: 16px;
    padding: 36px 32px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }

  .error-box {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    color: #fca5a5;
    font-size: 0.875rem;
    margin-bottom: 20px;
    display: none;
  }
  .error-box.show { display: block; }

  label {
    display: block;
    color: #94a3b8;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  input[type="password"] {
    width: 100%;
    padding: 12px 44px 12px 16px;
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 10px;
    color: #e2e8f0;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="password"]:focus { border-color: #2563eb; }
  input[type="password"]::placeholder { color: #475569; }

  .toggle-pw {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #475569;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 2px;
    line-height: 1;
  }
  .toggle-pw:hover { color: #94a3b8; }

  .submit-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: -0.01em;
  }
  .submit-btn:hover { opacity: 0.92; }
  .submit-btn:active { transform: scale(0.99); }

  .footer-note {
    text-align: center;
    margin-top: 24px;
    color: #334155;
    font-size: 0.78rem;
  }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">🤖</div>
    <h1>Bucky Agent OS</h1>
    <p>운영 대시보드 접근</p>
  </div>

  <div class="card">
    <div class="error-box" id="errBox">비밀번호가 올바르지 않습니다. 다시 시도해주세요.</div>

    <form method="POST" action="/api/login" id="loginForm">
      <input type="hidden" name="redirect" id="redirectInput" value="">
      <label for="pw">비밀번호</label>
      <div class="input-wrap">
        <input type="password" id="pw" name="password" placeholder="비밀번호를 입력하세요" autofocus required />
        <button type="button" class="toggle-pw" onclick="togglePw()" id="toggleBtn">👁</button>
      </div>
      <button type="submit" class="submit-btn">입장하기</button>
    </form>
  </div>

  <p class="footer-note">obsidian-agent-brain-system &mdash; 내부 전용</p>
</div>

<script>
(function(){
  const params = new URLSearchParams(location.search);
  if (params.get('error') === '1') {
    document.getElementById('errBox').classList.add('show');
  }
  const redirect = params.get('redirect');
  if (redirect) {
    document.getElementById('redirectInput').value = redirect;
  }
})();

function togglePw() {
  const input = document.getElementById('pw');
  const btn = document.getElementById('toggleBtn');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}
</script>
</body>
</html>
