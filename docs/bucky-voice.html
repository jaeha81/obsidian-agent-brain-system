<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bucky">
  <meta name="theme-color" content="#0a0a12">
  <title>Bucky Voice</title>
  <link rel="manifest" href="/bucky-voice-manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a12;
      --surface: #12121e;
      --surface2: #1a1a2c;
      --border: rgba(255,255,255,0.07);
      --primary: #7c3aed;
      --primary-light: #a78bfa;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --text: #e5e7eb;
      --text2: #9ca3af;
      --text3: #6b7280;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: -webkit-fill-available;
    }

    /* ── Header ────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      padding-top: max(14px, env(safe-area-inset-top));
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: rgba(10,10,18,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .logo span { color: var(--primary-light); }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      transition: all 0.3s;
    }
    .status-dot.busy {
      background: var(--warning);
      box-shadow: 0 0 6px var(--warning);
      animation: dot-pulse 1s ease-in-out infinite;
    }
    .status-dot.offline { background: var(--danger); box-shadow: 0 0 6px var(--danger); }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    .header-actions { display: flex; gap: 8px; }

    .icon-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text2);
      font-size: 16px;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    .icon-btn:active { background: var(--surface2); }

    /* ── Chat Area ─────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      max-width: 82%;
      padding: 11px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.55;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.bucky {
      align-self: flex-start;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--primary-light);
      margin-bottom: 4px;
    }

    .msg.error { border-color: rgba(239,68,68,0.3); }
    .msg.error .msg-label { color: #f87171; }

    /* typing dots */
    .msg.typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }
    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text3);
      animation: typing-bounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.30s; }
    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-7px); opacity: 1; }
    }

    /* ── Voice Area ────────────────────────────── */
    #voice-area {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 16px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      gap: 14px;
      background: linear-gradient(to top, rgba(10,10,18,0.98) 60%, transparent);
    }

    /* Waveform bars */
    #waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 36px;
    }

    .wave-bar {
      width: 3px;
      background: var(--danger);
      border-radius: 2px;
      height: 5px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .listening .wave-bar { opacity: 1; }

    .wave-bar:nth-child(1) { animation: wave 0.7s ease-in-out 0.0s infinite; }
    .wave-bar:nth-child(2) { animation: wave 0.7s ease-in-out 0.1s infinite; }
    .wave-bar:nth-child(3) { animation: wave 0.7s ease-in-out 0.2s infinite; }
    .wave-bar:nth-child(4) { animation: wave 0.7s ease-in-out 0.15s infinite; }
    .wave-bar:nth-child(5) { animation: wave 0.7s ease-in-out 0.3s infinite; }
    .wave-bar:nth-child(6) { animation: wave 0.7s ease-in-out 0.2s infinite; }
    .wave-bar:nth-child(7) { animation: wave 0.7s ease-in-out 0.1s infinite; }
    .wave-bar:nth-child(8) { animation: wave 0.7s ease-in-out 0.0s infinite; }
    .wave-bar:nth-child(9) { animation: wave 0.7s ease-in-out 0.1s infinite; }

    @keyframes wave {
      0%, 100% { height: 5px; }
      50% { height: 28px; }
    }

    /* Mic button */
    #mic-btn {
      width: 76px; height: 76px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      background: var(--surface2);
      transition: all 0.25s;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      position: relative;
    }

    #mic-btn::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid transparent;
      pointer-events: none;
      transition: all 0.3s;
    }

    /* Idle: subtle hover */
    #voice-area:not(.listening):not(.processing):not(.speaking) #mic-btn:active {
      transform: scale(0.95);
    }

    /* Listening state */
    #voice-area.listening #mic-btn {
      background: var(--danger);
      border-color: rgba(239,68,68,0.6);
      box-shadow: 0 0 0 0 rgba(239,68,68,0.4);
      animation: pulse-danger 1.4s ease-in-out infinite;
    }

    /* Processing state */
    #voice-area.processing #mic-btn {
      border-color: var(--primary);
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
    }

    /* Speaking state */
    #voice-area.speaking #mic-btn {
      background: var(--primary);
      border-color: rgba(124,58,237,0.6);
      box-shadow: 0 0 20px rgba(124,58,237,0.35);
      animation: pulse-primary 2s ease-in-out infinite;
    }

    @keyframes pulse-danger {
      0%   { box-shadow: 0 0 0 0   rgba(239,68,68,0.5); transform: scale(1); }
      70%  { box-shadow: 0 0 0 18px rgba(239,68,68,0);   transform: scale(1.04); }
      100% { box-shadow: 0 0 0 0   rgba(239,68,68,0);   transform: scale(1); }
    }

    @keyframes pulse-primary {
      0%, 100% { box-shadow: 0 0 12px rgba(124,58,237,0.3); }
      50%       { box-shadow: 0 0 30px rgba(124,58,237,0.6); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #status-text {
      font-size: 13px;
      color: var(--text2);
      letter-spacing: 0.02em;
      min-height: 18px;
    }

    #interim-text {
      font-size: 13px;
      color: var(--text3);
      font-style: italic;
      min-height: 16px;
      max-width: 280px;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Text fallback input */
    #text-input-area {
      display: none;
      width: 100%;
      gap: 8px;
      align-items: flex-end;
    }
    #text-input-area.visible { display: flex; }

    #text-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      resize: none;
      max-height: 90px;
      line-height: 1.4;
    }
    #text-input:focus { border-color: var(--primary); }

    #text-send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--primary);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    #text-send-btn:active { opacity: 0.8; }

    /* No-speech warning */
    #no-speech-warning {
      display: none;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: #fca5a5;
      text-align: center;
      margin: 0 14px;
      line-height: 1.5;
    }

    /* ── Settings Modal ────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 200;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      width: 100%;
      padding: 22px 18px;
      padding-bottom: max(22px, env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(.16,1,.3,1);
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 18px;
    }

    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 18px; }

    .setting-row { margin-bottom: 14px; }

    .setting-label {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.07em;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .setting-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 13px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .setting-input:focus { border-color: var(--primary); }

    .btn-save {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-save:active { opacity: 0.85; }

    .modal-note {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      margin-top: 10px;
      line-height: 1.6;
    }
    .modal-note code {
      display: block;
      background: var(--surface2);
      border-radius: 6px;
      padding: 6px 8px;
      margin-top: 6px;
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 10px;
      color: var(--text2);
      white-space: nowrap;
      overflow-x: auto;
    }

    /* text mode toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .toggle-label { font-size: 14px; color: var(--text2); }

    .toggle {
      position: relative;
      width: 44px; height: 26px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: var(--surface2);
      border-radius: 13px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      left: 3px; top: 3px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--text3);
      transition: all 0.2s;
    }
    .toggle input:checked + .slider { background: var(--primary); border-color: var(--primary); }
    .toggle input:checked + .slider::before {
      transform: translateX(18px);
      background: #fff;
    }
  </style>
<script src="/shared/auth.js"></script>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="status-dot" id="status-dot"></div>
      BUCKY<span>&nbsp;VOICE</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="clear-btn" title="대화 초기화" aria-label="대화 초기화">🗑</button>
      <button class="icon-btn" id="settings-btn" title="설정" aria-label="설정">⚙️</button>
    </div>
  </header>

  <div id="no-speech-warning">
    이 브라우저는 음성 인식을 지원하지 않습니다.<br>
    텍스트 입력 모드로 전환합니다.
  </div>

  <div id="chat" role="log" aria-live="polite"></div>

  <div id="voice-area">
    <div id="waveform" aria-hidden="true">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>

    <button id="mic-btn" aria-label="음성 입력">🎤</button>

    <div id="status-text">탭하여 말하기</div>
    <div id="interim-text" aria-live="polite"></div>

    <div id="text-input-area">
      <textarea id="text-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
      <button id="text-send-btn" aria-label="전송">↑</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal" role="dialog" aria-label="설정">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">설정</div>

    <div class="setting-row">
      <div class="setting-label">Bucky 서버 주소</div>
      <input class="setting-input" id="server-url-input" type="url"
        placeholder="http://192.168.1.x:8765" autocomplete="off" spellcheck="false">
    </div>

    <div class="setting-row">
      <div class="setting-label">TTS 속도</div>
      <input class="setting-input" id="tts-rate-input" type="number"
        min="0.5" max="2.0" step="0.1" value="1.1">
    </div>

    <div class="toggle-row">
      <span class="toggle-label">텍스트 입력 모드</span>
      <label class="toggle">
        <input type="checkbox" id="text-mode-toggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">자동 읽기 (TTS)</span>
      <label class="toggle">
        <input type="checkbox" id="tts-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <button class="btn-save" id="save-settings-btn">저장</button>
    <div class="modal-note">
      모바일에서 사용하려면 서버를 0.0.0.0으로 실행하세요:
      <code>python scripts/bucky_chat_server.py --host 0.0.0.0</code>
    </div>
  </div>
</div>

<script>
'use strict';

/* ── Config ──────────────────────────────────────── */
let serverUrl = localStorage.getItem('bv_server') || window.location.origin;
let sessionId  = localStorage.getItem('bv_session') || null;
let ttsRate    = parseFloat(localStorage.getItem('bv_tts_rate') || '1.1');
let ttsEnabled = localStorage.getItem('bv_tts') !== '0';
let textMode   = localStorage.getItem('bv_text_mode') === '1';

/* ── DOM refs ─────────────────────────────────────── */
const chatEl       = document.getElementById('chat');
const micBtn       = document.getElementById('mic-btn');
const statusDot    = document.getElementById('status-dot');
const statusText   = document.getElementById('status-text');
const interimEl    = document.getElementById('interim-text');
const voiceArea    = document.getElementById('voice-area');
const waveformEl   = document.getElementById('waveform');
const textInputEl  = document.getElementById('text-input');
const textInputArea= document.getElementById('text-input-area');
const textSendBtn  = document.getElementById('text-send-btn');
const noSpeechWarn = document.getElementById('no-speech-warning');

/* ── State ────────────────────────────────────────── */
// 'idle' | 'listening' | 'processing' | 'speaking'
let appState = 'idle';

/* ── Service Worker ───────────────────────────────── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw-bucky-voice.js').catch(() => {});
}

/* ── Speech Recognition ───────────────────────────── */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let hasSpeechSupport = !!SR;

if (SR) {
  recognition = new SR();
  recognition.lang = 'ko-KR';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onresult = (e) => {
    let interimText = '';
    let finalText   = '';
    for (const result of e.results) {
      if (result.isFinal) finalText   += result[0].transcript;
      else                 interimText += result[0].transcript;
    }
    interimEl.textContent = finalText || interimText;
    if (finalText) {
      recognition.abort();
      handleUserInput(finalText.trim());
    }
  };

  recognition.onend = () => {
    if (appState === 'listening') setState('idle');
  };

  recognition.onerror = (e) => {
    if (e.error === 'aborted') return;
    if (e.error === 'not-allowed') showError('마이크 권한이 필요합니다. 브라우저 설정에서 허용해주세요.');
    else if (e.error === 'no-speech') setState('idle');
    else showError(`음성 오류: ${e.error}`);
    setState('idle');
  };
} else {
  noSpeechWarn.style.display = 'block';
  textMode = true;
}

/* ── TTS ──────────────────────────────────────────── */
let voicesReady = false;
function loadVoices() {
  window.speechSynthesis.getVoices();
  voicesReady = true;
}
if ('speechSynthesis' in window) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text) {
  if (!ttsEnabled || !('speechSynthesis' in window)) {
    setState('idle');
    return;
  }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ko-KR';
  utter.rate = ttsRate;

  if (voicesReady) {
    const voices = window.speechSynthesis.getVoices();
    const koVoice = voices.find(v => v.lang.startsWith('ko') && v.localService)
                 || voices.find(v => v.lang.startsWith('ko'));
    if (koVoice) utter.voice = koVoice;
  }

  utter.onstart = () => { if (appState !== 'idle') setState('speaking'); };
  utter.onend   = () => setState('idle');
  utter.onerror = () => setState('idle');
  window.speechSynthesis.speak(utter);
}

/* ── State Machine ────────────────────────────────── */
const STATE = {
  idle:       { icon: '🎤', label: '탭하여 말하기',  dot: '' },
  listening:  { icon: '⏹',  label: '듣는 중...',     dot: 'busy' },
  processing: { icon: '⌛',  label: '생각 중...',     dot: 'busy' },
  speaking:   { icon: '🔊', label: '말하는 중...',    dot: '' },
};

function setState(s) {
  appState = s;
  const cfg = STATE[s] || STATE.idle;
  voiceArea.className = s;
  micBtn.textContent = cfg.icon;
  statusText.textContent = cfg.label;
  statusDot.className = 'status-dot' + (cfg.dot ? ` ${cfg.dot}` : '');
  if (s !== 'listening' && s !== 'processing') interimEl.textContent = '';
}

/* ── Mic Button ───────────────────────────────────── */
micBtn.addEventListener('click', () => {
  if (textMode) return;
  switch (appState) {
    case 'idle':
      startListening();
      break;
    case 'listening':
      recognition?.abort();
      setState('idle');
      break;
    case 'speaking':
      window.speechSynthesis.cancel();
      setState('idle');
      break;
  }
});

function startListening() {
  if (!recognition) return;
  try {
    recognition.start();
    setState('listening');
  } catch (_) {}
}

/* ── Chat Functions ───────────────────────────────── */
function escHtml(t) {
  return t
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

function addMessage(role, text, isError = false) {
  const div = document.createElement('div');
  div.className = `msg ${role}${isError ? ' error' : ''}`;
  if (role === 'bucky') {
    div.innerHTML = `<div class="msg-label">${isError ? '오류' : 'BUCKY'}</div>${escHtml(text)}`;
  } else {
    div.textContent = text;
  }
  chatEl.appendChild(div);
  chatEl.scrollTo({ top: chatEl.scrollHeight, behavior: 'smooth' });
  return div;
}

function showTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'msg bucky typing';
  div.id = 'bv-typing';
  div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  chatEl.appendChild(div);
  chatEl.scrollTo({ top: chatEl.scrollHeight, behavior: 'smooth' });
}

function hideTypingIndicator() {
  document.getElementById('bv-typing')?.remove();
}

function showError(msg) {
  addMessage('bucky', msg, true);
}

/* ── Chat API ─────────────────────────────────────── */
async function handleUserInput(text) {
  if (!text.trim()) return;
  addMessage('user', text);
  setState('processing');
  showTypingIndicator();

  try {
    const res = await fetch(`${serverUrl}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sessionId }),
      signal: AbortSignal.timeout(60000),
    });

    if (!res.ok) {
      const body = await res.text().catch(() => '');
      throw new Error(`서버 오류 ${res.status}${body ? ': ' + body.slice(0, 100) : ''}`);
    }

    const data = await res.json();
    if (data.session_id) {
      sessionId = data.session_id;
      localStorage.setItem('bv_session', sessionId);
    }

    hideTypingIndicator();
    addMessage('bucky', data.reply || data.error || '(빈 응답)');
    speak(data.reply || '');
    if (!ttsEnabled) setState('idle');

  } catch (err) {
    hideTypingIndicator();
    if (err.name === 'TimeoutError') showError('응답 시간 초과. 서버 연결을 확인해주세요.');
    else if (err.name === 'TypeError') showError('서버에 연결할 수 없습니다. 서버 주소를 확인해주세요.');
    else showError(err.message);
    setState('idle');
  }
}

/* ── Text Input ───────────────────────────────────── */
function applyTextMode(enabled) {
  textMode = enabled;
  textInputArea.classList.toggle('visible', enabled);
  micBtn.style.opacity = enabled ? '0.35' : '1';
  micBtn.style.pointerEvents = enabled ? 'none' : '';
  if (enabled) {
    statusText.textContent = '메시지를 입력하세요';
  } else {
    statusText.textContent = '탭하여 말하기';
  }
}

textSendBtn.addEventListener('click', sendTextInput);
textInputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendTextInput();
  }
});

function sendTextInput() {
  const text = textInputEl.value.trim();
  if (!text || appState === 'processing') return;
  textInputEl.value = '';
  textInputEl.style.height = 'auto';
  handleUserInput(text);
}

textInputEl.addEventListener('input', () => {
  textInputEl.style.height = 'auto';
  textInputEl.style.height = Math.min(textInputEl.scrollHeight, 90) + 'px';
});

/* ── Clear ────────────────────────────────────────── */
document.getElementById('clear-btn').addEventListener('click', async () => {
  if (!confirm('대화 내역을 초기화할까요?')) return;
  const oldSession = sessionId;
  chatEl.innerHTML = '';
  sessionId = null;
  localStorage.removeItem('bv_session');
  if (oldSession) {
    try {
      await fetch(`${serverUrl}/chat`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: oldSession }),
      });
    } catch (_) {}
  }
  addWelcome();
});

/* ── Settings ─────────────────────────────────────── */
const settingsModal    = document.getElementById('settings-modal');
const serverInput      = document.getElementById('server-url-input');
const ttsRateInput     = document.getElementById('tts-rate-input');
const textModeToggle   = document.getElementById('text-mode-toggle');
const ttsToggle        = document.getElementById('tts-toggle');

document.getElementById('settings-btn').addEventListener('click', () => {
  serverInput.value       = serverUrl;
  ttsRateInput.value      = ttsRate;
  textModeToggle.checked  = textMode;
  ttsToggle.checked       = ttsEnabled;
  settingsModal.classList.add('open');
});

settingsModal.addEventListener('click', (e) => {
  if (e.target === settingsModal) settingsModal.classList.remove('open');
});

document.getElementById('save-settings-btn').addEventListener('click', () => {
  const url = serverInput.value.trim().replace(/\/$/, '');
  if (url) { serverUrl = url; localStorage.setItem('bv_server', url); }

  ttsRate    = parseFloat(ttsRateInput.value) || 1.1;
  ttsEnabled = ttsToggle.checked;
  localStorage.setItem('bv_tts_rate', ttsRate);
  localStorage.setItem('bv_tts', ttsEnabled ? '1' : '0');

  const newTextMode = textModeToggle.checked;
  localStorage.setItem('bv_text_mode', newTextMode ? '1' : '0');
  applyTextMode(newTextMode);

  settingsModal.classList.remove('open');
});

/* ── Network status ───────────────────────────────── */
function updateOnlineStatus() {
  if (!navigator.onLine) statusDot.classList.add('offline');
  else if (appState === 'idle') statusDot.classList.remove('offline');
}
window.addEventListener('online',  updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);

/* ── Welcome ──────────────────────────────────────── */
function addWelcome() {
  addMessage('bucky', '안녕하세요! 버키입니다.\n🎤 버튼을 탭하고 말씀해 주세요.');
}

/* ── Init ─────────────────────────────────────────── */
setState('idle');
applyTextMode(textMode || !hasSpeechSupport);
addWelcome();
</script>
</body>
</html>
