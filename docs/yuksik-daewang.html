 <div class="visit-row"><div class="visit-label">ADDRESS</div><div class="visit-value" data-bind="business.address"></div><div class="visit-sub" data-bind="business.lotAddress"></div><button class="copy-btn" id="copyAddress">주소 복사</button></div>
 <div class="visit-row"><div class="visit-label">PHONE</div><a class="visit-value js-call" href="#" data-bind="business.phoneDisplay"></a></div>
 <div class="visit-row" id="hoursRow"><div class="visit-label">HOURS</div><div class="visit-value" id="hoursValue"></div></div>
 <div class="visit-row" id="parkingRow"><div class="visit-label">PARKING</div><div class="visit-value" id="parkingValue"></div></div>
 </div>
 <div class="visit-actions">
 <a class="cta cta-primary js-call" href="#"><span data-bind="copy.callLabel"></span></a>
 <a class="cta cta-secondary js-map" href="#" target="_blank" rel="noopener"><span data-bind="copy.directionsLabel"></span></a>
 </div>
 </div>
 <a class="insta-link" id="instagramLink" href="#" target="_blank" rel="noopener"><span>인스타그램에서 매장 소식 보기</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-5-5 5 5-5 5"/></svg></a>
 </div>
 </div>
 </section>
 </main>

 <footer><div class="shell footer-inner"><div class="footer-name" data-bind="business.fullName"></div><div data-bind="copy.footer"></div><div>※ 실제 운영정보는 네이버 지도 또는 매장 전화로 최종 확인해 주세요.</div></div></footer>
 </div>

 <nav class="sticky-actions" aria-label="빠른 연락">
 <div class="sticky-inner">
 <a class="cta cta-secondary js-map" href="#" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20 10c0 5-8 12-8 12S4 15 4 10a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="2.6"/></svg><span data-bind="copy.directionsLabel"></span></a>
 <a class="cta cta-primary js-call" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.9.33 1.78.62 2.63a2 2 0 0 1-.45 2.11L8 9.73a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.85.29 1.73.5 2.63.62A2 2 0 0 1 22 16.92Z"/></svg><span data-bind="copy.callLabel"></span></a>
 </div>
 </nav>
 <div class="toast" id="toast" role="status" aria-live="polite"></div>

 <script>
 (()=>{
 const data = JSON.parse(document.getElementById('business-data').textContent);
 const get=(path)=>path.split('.').reduce((o,k)=>o&&o[k],data);
 document.documentElement.style.setProperty('--primary',data.theme.primary);
 document.documentElement.style.setProperty('--primary-dark',data.theme.primaryDark);
 document.documentElement.style.setProperty('--ink',data.theme.ink);
 document.documentElement.style.setProperty('--paper',data.theme.paper);
 document.documentElement.style.setProperty('--card',data.theme.card);
 document.documentElement.style.setProperty('--muted',data.theme.muted);
 document.documentElement.style.setProperty('--line',data.theme.line);
 document.querySelectorAll('[data-bind]').forEach(el=>{const v=get(el.dataset.bind);if(v!==undefined)el.textContent=v});
 document.querySelectorAll('.js-call').forEach(a=>a.href='tel:'+data.business.phoneTel);
 document.querySelectorAll('.js-map').forEach(a=>a.href=data.business.naverMapUrl);
 document.getElementById('instagramLink').href=data.business.instagramUrl;
 if(!data.visibility.instagram)document.getElementById('instagramLink').hidden=true;
 const icons={
 cut:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4c4 0 6 2 7 5 1-3 3-5 7-5v7c0 5-3 9-7 9s-7-4-7-9V4Z"/><path d="M9 12h6"/></svg>',
 pin:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 5-8 12-8 12S4 15 4 10a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="2.6"/></svg>',
 phone:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.9.33 1.78.62 2.63a2 2 0 0 1-.45 2.11L8 9.73a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.85.29 1.73.5 2.63.62A2 2 0 0 1 22 16.92Z"/></svg>'
 };
 document.getElementById('sellingPointGrid').innerHTML=data.sellingPoints.map(x=>`<article class="point-card"><div class="point-icon">${icons[x.icon]||icons.cut}</div><div><h3>${escapeHtml(x.title)}</h3><p>${escapeHtml(x.text)}</p></div></article>`).join('');
 document.getElementById('menuGrid').innerHTML=data.menuHighlights.map((x,i)=>`<article class="menu-card"><div class="menu-index">0${i+1}</div><div><h3>${escapeHtml(x.name)}</h3><p>${escapeHtml(x.descriptor)}</p></div></article>`).join('');
 document.getElementById('menuSection').hidden=!data.visibility.menu;
 const hoursValue=data.visibility.hours&&data.business.hoursStatus==='verified'&&data.business.hoursText?data.business.hoursText:data.copy.hoursFallback;
 document.getElementById('hoursValue').textContent=hoursValue;
 const parkingValue=data.visibility.parking&&data.business.parkingStatus==='verified'&&data.business.parkingText?data.business.parkingText:data.copy.parkingFallback;
 document.getElementById('parkingValue').textContent=parkingValue;
 const toast=document.getElementById('toast');let toastTimer;
 const showToast=(msg)=>{toast.textContent=msg;toast.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove('show'),1800)};
 document.getElementById('copyAddress').addEventListener('click',async()=>{try{await navigator.clipboard.writeText(data.business.address);showToast('주소를 복사했습니다')}catch(e){showToast('주소: '+data.business.address)}});
 document.getElementById('shareButton').addEventListener('click',async()=>{const payload={title:data.business.fullName,text:data.copy.subheadline,url:data.business.naverMapUrl};try{if(navigator.share)await navigator.share(payload);else{await navigator.clipboard.writeText(data.business.naverMapUrl);showToast('매장 링크를 복사했습니다')}}catch(e){}});
 const ld={"@context":"https://schema.org","@type":"Restaurant","name":data.business.fullName,"telephone":data.business.phoneDisplay,"servesCuisine":"Korean barbecue","address":{"@type":"PostalAddress","streetAddress":data.business.address,"addressLocality":"고양시","addressRegion":"경기도","addressCountry":"KR"},"sameAs":[data.business.naverMapUrl,data.business.instagramUrl]};
 const ldEl=document.createElement('script');ldEl.type='application/ld+json';ldEl.textContent=JSON.stringify(ld);document.head.appendChild(ldEl);
 function escapeHtml(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
 })();
 </script>
</body>
</html>
