<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JH Project Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg: #0b0d12;
    --surface: #13151c;
    --surface2: #1a1d27;
    --border: #252836;
    --border2: #2e3245;
    --text: #e8eaf2;
    --text-dim: #7c8099;
    --text-muted: #4a4f6a;
    --accent: #6c63ff;
    --accent2: #4ecdc4;
    --green: #43e97b;
    --orange: #f7971e;
    --blue: #4facfe;
    --red: #ff6b6b;
    --yellow: #ffd93d;
    --purple: #a855f7;
    --pink: #ec4899;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', -apple-system, 'Noto Sans KR', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    background: linear-gradient(135deg, #13151c 0%, #0b0d12 100%);
  }
  .header-left {}
  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .header-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .header-sub {
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 2px;
  }
  .nav-links {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .nav-links a {
    font-size: 11px;
    color: var(--text-dim);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
    transition: all 0.2s;
  }
  .nav-links a:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(108,99,255,.08);
  }

  /* ── Tab Bar ── */
  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    background: var(--surface);
    overflow-x: auto;
  }
  .tab-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 13px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--text);
    border-bottom-color: currentColor;
  }
  .tab-btn.t-bucky.active    { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn.t-skills.active   { color: var(--green);  border-bottom-color: var(--green); }
  .tab-btn.t-vault.active    { color: var(--blue);   border-bottom-color: var(--blue); }
  .tab-btn.t-projects.active { color: var(--orange); border-bottom-color: var(--orange); }
  .dot-bucky    { background: var(--accent); }
  .dot-skills   { background: var(--green); }
  .dot-vault    { background: var(--blue); }
  .dot-projects { background: var(--orange); }

  /* ── Graph Area ── */
  .graph-wrap {
    flex: 1;
    display: flex;
    gap: 0;
    min-height: 0;
    overflow: hidden;
  }
  .graph-container {
    flex: 1;
    position: relative;
    min-height: 600px;
    min-width: 0;
  }
  #graph-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px;
    min-width: 240px;
    border-left: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .sidebar-section {}
  .sidebar-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .node-detail {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 12px;
    font-size: 12px;
    color: var(--text-dim);
    min-height: 80px;
  }
  .node-detail .nd-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .node-detail .nd-type {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .node-detail .nd-desc {
    font-size: 11px;
    line-height: 1.5;
    color: var(--text-dim);
  }

  .stats-row {
    display: flex;
    gap: 8px;
  }
  .stat-mini {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
    text-align: center;
  }
  .stat-mini .sn { font-size: 18px; font-weight: 700; color: var(--text); }
  .stat-mini .sl { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

  /* D3 link/node styles */
  .link {
    stroke: #2e3245;
    stroke-opacity: 0.7;
    stroke-width: 1.2;
    fill: none;
  }
  .link.highlighted {
    stroke-opacity: 1;
    stroke-width: 2;
  }
  .node circle {
    cursor: pointer;
    transition: r 0.2s;
  }
  .node circle:hover { opacity: 0.9; }
  .node text {
    pointer-events: none;
    font-family: 'Segoe UI', sans-serif;
    fill: #c9d1d9;
    font-size: 10px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  /* Controls */
  .controls-row {
    display: flex;
    gap: 8px;
    padding: 10px 32px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    background: var(--surface);
  }
  .ctrl-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ctrl-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .ctrl-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
  }

  @media (max-width: 768px) {
    body {
      min-height: 100dvh;
    }
    .header {
      padding: 18px 20px 16px;
      align-items: flex-start;
      flex-direction: column;
    }
    .header-title {
      font-size: clamp(34px, 12vw, 48px);
      line-height: 1.1;
    }
    .header-sub {
      font-size: 18px;
      line-height: 1.5;
      max-width: 260px;
    }
    .nav-links {
      width: 100%;
      gap: 8px;
      padding-top: 6px;
    }
    .nav-links a {
      font-size: 16px;
      padding: 9px 18px;
    }
    .tab-bar {
      padding: 0 20px;
      scrollbar-width: thin;
    }
    .tab-btn {
      padding: 16px 22px;
      font-size: 20px;
      gap: 12px;
    }
    .tab-btn .dot {
      width: 11px;
      height: 11px;
    }
    .controls-row {
      padding: 12px 20px;
      gap: 10px;
      flex-wrap: wrap;
      align-items: stretch;
    }
    .ctrl-btn {
      min-height: 44px;
      padding: 8px 14px;
      font-size: 16px;
    }
    .ctrl-label {
      flex: 1 0 100%;
      margin-left: 0;
      font-size: 15px;
      line-height: 1.45;
    }
    .graph-wrap {
      flex: none;
      display: block;
      min-height: auto;
      overflow: visible;
    }
    .graph-container {
      width: 100%;
      min-height: min(72dvh, 680px);
      height: min(72dvh, 680px);
      border-bottom: 1px solid var(--border);
    }
    .sidebar {
      width: 100%;
      min-width: 0;
      border-left: none;
      border-top: 1px solid var(--border);
      padding: 20px;
      max-height: none;
      overflow: visible;
    }
    .node-detail {
      min-height: 96px;
      font-size: 16px;
      line-height: 1.5;
    }
    .node-detail .nd-name {
      font-size: 18px;
    }
    .node-detail .nd-desc {
      font-size: 15px;
    }
    .stats-row {
      gap: 12px;
    }
    .stat-mini {
      padding: 14px 10px;
    }
    .stat-mini .sn {
      font-size: 28px;
    }
    .stat-mini .sl,
    .sidebar-label,
    .legend-item {
      font-size: 15px;
    }
    .legend-dot {
      width: 13px;
      height: 13px;
    }
  }
</style>
</head>

// ─────────────────────────────────────────
// D3 Rendering
// ─────────────────────────────────────────
let currentTab = 'bucky';
let showLabels = true;
let simulation, svg, g, linkSel, nodeSel, labelSel;
let zoom;

function initSVG() {
  const container = document.querySelector('.graph-container');
  const W = Math.max(container.clientWidth || 0, 320);
  const H = Math.max(container.clientHeight || 0, 420);

  svg = d3.select('#graph-svg')
    .attr('width', W)
    .attr('height', H)
    .attr('viewBox', `0 0 ${W} ${H}`);

  zoom = d3.zoom()
    .scaleExtent([0.2, 4])
    .on('zoom', (event) => {
      g.attr('transform', event.transform);
    });

  svg.call(zoom);

  g = svg.append('g');
  return { W, H };
}

function renderGraph(tabId) {
  const data = GRAPHS[tabId];
  const container = document.querySelector('.graph-container');
  const W = Math.max(container.clientWidth || 0, 320);
  const H = Math.max(container.clientHeight || 0, 420);
  svg.attr('width', W)
    .attr('height', H)
    .attr('viewBox', `0 0 ${W} ${H}`);

  // Clear
  if (g) g.selectAll('*').remove();
  if (simulation) simulation.stop();

  // Update stats
  document.getElementById('stat-nodes').textContent = data.nodes.length;
  document.getElementById('stat-links').textContent = data.links.length;

  // Legend
  const legendEl = document.getElementById('legend-list');
  legendEl.innerHTML = '';
  for (const [key, grp] of Object.entries(data.groups)) {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-dot" style="background:${grp.color}"></span>${grp.label}`;
    legendEl.appendChild(item);
  }

  // Build link map
  const nodeById = {};
  data.nodes.forEach(n => { nodeById[n.id] = n; });
  const links = data.links
    .filter(l => nodeById[l.s] && nodeById[l.t])
    .map(l => ({ source: l.s, target: l.t }));

  // Color scale
  const colorOf = (group) => (data.groups[group] || {color: '#8b949e'}).color;

  // Arrow marker
  svg.select('defs').remove();
  svg.append('defs').selectAll('marker')
    .data(['link'])
    .join('marker')
    .attr('id', 'arrow')
    .attr('viewBox', '0 -4 8 8')
    .attr('refX', 18)
    .attr('refY', 0)
    .attr('markerWidth', 4)
    .attr('markerHeight', 4)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-4L8,0L0,4')
    .attr('fill', '#2e3245');

  // Links
  linkSel = g.append('g').attr('class', 'links')
    .selectAll('line')
    .data(links)
    .join('line')
    .attr('class', 'link')
    .attr('marker-end', 'url(#arrow)');

  // Nodes
  const nodeGroup = g.append('g').attr('class', 'nodes')
    .selectAll('g')
    .data(data.nodes)
    .join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', dragStart)
      .on('drag', dragging)
      .on('end', dragEnd)
    )
    .on('click', (event, d) => {
      event.stopPropagation();
      showNodeDetail(d, colorOf(d.group));
      // highlight connected
      linkSel.classed('highlighted', l =>
        l.source.id === d.id || l.target.id === d.id);
    });

  nodeGroup.append('circle')
    .attr('r', d => d.size || 10)
    .attr('fill', d => colorOf(d.group))
    .attr('fill-opacity', 0.85)
    .attr('stroke', d => colorOf(d.group))
    .attr('stroke-width', 1.5)
    .attr('stroke-opacity', 0.4);

  // glow for core/hub nodes
  nodeGroup.filter(d => d.group === 'core' || d.group === 'hub')
    .select('circle')
    .attr('filter', 'drop-shadow(0 0 6px currentColor)');

  // labels
  labelSel = nodeGroup.append('text')
    .attr('x', d => (d.size || 10) + 4)
    .attr('y', 4)
    .text(d => d.label)
    .style('display', showLabels ? '' : 'none');

  // Simulation
  simulation = d3.forceSimulation(data.nodes)
    .force('link', d3.forceLink(links)
      .id(d => d.id)
      .distance(d => {
        const s = d.source.group || '';
        const t = d.target.group || '';
        if (s === 'core' || t === 'core' || s === 'hub' || t === 'hub') return 120;
        return 80;
      })
      .strength(0.6))
    .force('charge', d3.forceManyBody().strength(d => {
      if (d.group === 'core' || d.group === 'hub') return -400;
      return -180;
    }))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide().radius(d => (d.size || 10) + 10))
    .on('tick', ticked);

  function ticked() {
    linkSel
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    nodeGroup.attr('transform', d => `translate(${d.x},${d.y})`);
  }

  // Click on background deselects
  svg.on('click', () => {
    linkSel.classed('highlighted', false);
    document.getElementById('node-detail').innerHTML = '<div class="nd-desc">노드를 클릭하면 상세 정보가 표시됩니다.</div>';
  });
}

function showNodeDetail(d, color) {
  const el = document.getElementById('node-detail');
  el.innerHTML = `
    <div class="nd-name" style="color:${color}">${d.label}</div>
    <div class="nd-type" style="color:${color}">${d.group}</div>
    <div class="nd-desc">${d.desc || ''}</div>
  `;
}

function dragStart(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragging(event, d) {
  d.fx = event.x; d.fy = event.y;
}
function dragEnd(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ─────────────────────────────────────────
// Tab switching
// ─────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    renderGraph(currentTab);
    // Reset zoom
    svg.transition().duration(400).call(
      zoom.transform, d3.zoomIdentity
    );
    // Reset detail
    document.getElementById('node-detail').innerHTML = '<div class="nd-desc">노드를 클릭하면 상세 정보가 표시됩니다.</div>';
  });
});

// Controls
document.getElementById('btn-reset').addEventListener('click', () => {
  svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
});
document.getElementById('btn-relayout').addEventListener('click', () => {
  if (simulation) {
    simulation.alpha(0.8).restart();
  }
});
document.getElementById('btn-labels').addEventListener('click', () => {
  showLabels = !showLabels;
  if (labelSel) labelSel.style('display', showLabels ? '' : 'none');
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'r') {
    e.preventDefault();
    if (simulation) simulation.alpha(0.8).restart();
  }
  if (e.key === 'l' || e.key === 'L') {
    showLabels = !showLabels;
    if (labelSel) labelSel.style('display', showLabels ? '' : 'none');
  }
});

// ─────────────────────────────────────────
// Init
// ─────────────────────────────────────────
window.addEventListener('load', () => {
  initSVG();
  renderGraph(currentTab);
});

window.addEventListener('resize', () => {
  const container = document.querySelector('.graph-container');
  const W = Math.max(container.clientWidth || 0, 320);
  const H = Math.max(container.clientHeight || 0, 420);
  svg.attr('width', W)
    .attr('height', H)
    .attr('viewBox', `0 0 ${W} ${H}`);
  renderGraph(currentTab);
});
</script>
