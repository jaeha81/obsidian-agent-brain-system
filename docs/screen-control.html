<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PC 원격 제어 — BuckyOS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e2e2f0;
    --muted: #6b7280;
    --red: #ef4444;
    --green: #22c55e;
    --yellow: #eab308;
  }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Pretendard', 'Inter', sans-serif; overflow: hidden; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ── Topbar ── */
  #topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    user-select: none;
  }
  #topbar h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.5px; color: var(--accent2); flex: 1; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 500;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  }
  .badge.live { border-color: var(--green); color: var(--green); }
  .badge.err  { border-color: var(--red);   color: var(--red); }
  .badge.idle { border-color: var(--yellow); color: var(--yellow); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .dot.pulse { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Controls strip ── */
  #controls {
    display: flex; align-items: center; gap: 12px;
    padding: 6px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    font-size: 12px;
  }
  label { display: flex; align-items: center; gap: 6px; color: var(--muted); white-space: nowrap; }
  input[type=range] { width: 80px; accent-color: var(--accent); cursor: pointer; }
  select, button {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 3px 8px; font-size: 12px; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .sep { width: 1px; height: 18px; background: var(--border); }

  /* ── Viewport ── */
  #viewport {
    flex: 1; overflow: hidden; display: flex; align-items: center; justify-content: center;
    background: #000;
    cursor: crosshair;
    position: relative;
    touch-action: none;
    overscroll-behavior: contain;
  }
  #viewport:focus { outline: none; }
  #screen-img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    display: block;
    cursor: crosshair;
    user-select: none;
    -webkit-user-drag: none;
    touch-action: none;
    transform-origin: center center;
    transition: transform 0.05s linear;
    will-change: transform;
  }
  #overlay {
    position: absolute; inset: 0; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
  }
  #overlay-msg {
    background: rgba(0,0,0,0.7); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px 32px; text-align: center;
    font-size: 14px; color: var(--muted);
  }
  #overlay-msg h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }

  /* ── Status bar ── */
  #statusbar {
    display: flex; gap: 16px; padding: 4px 16px;
    background: var(--surface); border-top: 1px solid var(--border);
    font-size: 11px; color: var(--muted);
    flex-shrink: 0;
  }
  #statusbar span b { color: var(--text); }

  /* ── Keyboard panel ── */
  #kbd-panel {
    display: none;
    padding: 8px 16px; background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #kbd-panel.show { display: flex; align-items: center; gap: 8px; }
  #type-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 6px 10px; font-size: 13px;
  }
  #type-input:focus { outline: none; border-color: var(--accent); }

  .hotkey-btn {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer;
  }
  .hotkey-btn:hover { border-color: var(--accent); }
</style>
</head>
<body>
<div id="app">

  <!-- Topbar -->
  <div id="topbar">
    <h1>🖥 PC 원격 제어</h1>
    <span id="conn-badge" class="badge idle"><span class="dot"></span><span id="conn-text">연결 중…</span></span>
    <span id="fps-badge" class="badge">FPS <b id="fps-val">—</b></span>
    <span id="lat-badge" class="badge">지연 <b id="lat-val">—</b>ms</span>
  </div>

  <!-- Controls -->
  <div id="controls">
    <label>품질
      <input type="range" id="quality" min="10" max="90" value="55">
      <span id="quality-val">55</span>
    </label>
    <label>배율
      <input type="range" id="scale" min="10" max="100" step="5" value="55">
      <span id="scale-val">55</span>%
    </label>
    <label>FPS
      <select id="fps">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="15">15</option>
        <option value="20">20</option>
        <option value="30">30</option>
      </select>
    </label>
    <div class="sep"></div>
    <button id="btn-ctrl" onclick="toggleControl()">제어 OFF</button>
    <button id="btn-kbd" onclick="toggleKbd()">키보드</button>
    <button onclick="sendFullscreenKey()">전체화면</button>
    <button onclick="sendCtrlAltDel()">Ctrl+Alt+Del</button>
    <div class="sep"></div>
    <button id="btn-fullvp" onclick="toggleFullViewport()">뷰 확대</button>
    <button onclick="resetZoom()" id="btn-zoom-reset" style="display:none">줌 초기화</button>
  </div>

  <!-- Viewport -->
  <div id="viewport" tabindex="0"
    onmousedown="onMouseDown(event)"
    onmouseup="onMouseUp(event)"
    onmousemove="onMouseMove(event)"
    ondblclick="onDblClick(event)"
    oncontextmenu="onContextMenu(event)"
    onwheel="onWheel(event)"
    onkeydown="onKeyDown(event)"
    onkeyup="onKeyUp(event)">
    <img id="screen-img" src="" alt="화면" draggable="false">
    <div id="overlay">
      <div id="overlay-msg">
        <h2>연결 중…</h2>
        <p>BuckyOS 서버에 화면을 요청하고 있습니다.</p>
      </div>
    </div>
  </div>

  <!-- Keyboard panel -->
  <div id="kbd-panel">
    <input id="type-input" type="text" placeholder="텍스트 입력 후 전송"
      autocomplete="off" autocapitalize="none" enterkeyhint="send"
      onkeydown="onTypeInput(event)">
    <button class="hotkey-btn" id="btn-type-send" onclick="sendTypedText()">전송</button>
    <button class="hotkey-btn" onclick="sendHotkey(['ctrl','c'])">Copy</button>
    <button class="hotkey-btn" onclick="sendHotkey(['ctrl','v'])">Paste</button>
    <button class="hotkey-btn" onclick="sendHotkey(['ctrl','z'])">Undo</button>
    <button class="hotkey-btn" onclick="sendHotkey(['alt','tab'])">Alt+Tab</button>
    <button class="hotkey-btn" onclick="sendHotkey(['win'])">Win</button>
    <button class="hotkey-btn" onclick="sendKey('esc')">Esc</button>
    <button class="hotkey-btn" onclick="sendKey('enter')">Enter</button>
  </div>

  <!-- Statusbar -->
  <div id="statusbar">
    <span>해상도: <b id="st-res">—</b></span>
    <span>표시: <b id="st-disp">—</b></span>
    <span>마우스: <b id="st-mouse">—</b></span>
    <span>마지막: <b id="st-last">—</b></span>
    <span id="st-zoom-state" style="display:none">줌: <b id="zoom-val">100</b>%</span>
    <span id="st-ctrl-state">제어: <b>OFF</b></span>
  </div>

</div><!-- #app -->

<script>
const BASE = window.location.origin;
let screenW = 1920, screenH = 1080;
let controlEnabled = false;
let streaming = false;
let pollTimer = null;
let frameCount = 0, lastFpsTime = Date.now();
let lastMoveTime = 0;
const MOVE_THROTTLE_MS = 50;

// View zoom + pan (local CSS transform, independent of server capture scale)
let viewZoom = 1.0;
let panX = 0, panY = 0;
const MIN_ZOOM = 0.5, MAX_ZOOM = 5.0;

function applyViewTransform() {
  clampPan();
  img.style.transform = `translate(${panX}px, ${panY}px) scale(${viewZoom})`;
  const pct = Math.round(viewZoom * 100);
  const isZoomed = viewZoom !== 1.0 || panX !== 0 || panY !== 0;
  document.getElementById('zoom-val').textContent = pct;
  document.getElementById('st-zoom-state').style.display = isZoomed ? '' : 'none';
  document.getElementById('btn-zoom-reset').style.display = isZoomed ? '' : 'none';
}

function clampPan() {
  if (viewZoom <= 1.0) { panX = 0; panY = 0; return; }
  const vp = document.getElementById('viewport');
  const baseW = img.offsetWidth || vp.clientWidth;
  const baseH = img.offsetHeight || vp.clientHeight;
  const maxX = Math.max(0, (baseW * viewZoom - vp.clientWidth) / 2);
  const maxY = Math.max(0, (baseH * viewZoom - vp.clientHeight) / 2);
  panX = Math.max(-maxX, Math.min(maxX, panX));
  panY = Math.max(-maxY, Math.min(maxY, panY));
}

function setViewZoom(nextZoom, focalX, focalY) {
  const prevZoom = viewZoom;
  nextZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, nextZoom));
  if (Math.abs(nextZoom - prevZoom) < 0.001) return;

  if (typeof focalX === 'number' && typeof focalY === 'number') {
    const rect = img.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    const ratio = nextZoom / prevZoom;
    panX += (focalX - centerX) * (1 - ratio);
    panY += (focalY - centerY) * (1 - ratio);
  }

  viewZoom = nextZoom;
  applyViewTransform();
}

function resetZoom() {
  viewZoom = 1.0;
  panX = 0;
  panY = 0;
  applyViewTransform();
}

// Touch state
const touch = { startX: 0, startY: 0, lastTapTime: 0, longTimer: null, moved: false, count: 0,
                twoFingerX: 0, twoFingerY: 0, pinchDist: 0, pinchMode: null, prevX: 0, prevY: 0 };

// ── Init ──────────────────────────────────────────────────────────
(async function init() {
  await fetchScreenInfo();
  applySettings();
  startPolling();
  const vp = document.getElementById('viewport');
  vp.focus();
  vp.addEventListener('touchstart',  onTouchStart,  { passive: false });
  vp.addEventListener('touchmove',   onTouchMove,   { passive: false });
  vp.addEventListener('touchend',    onTouchEnd,    { passive: false });
  vp.addEventListener('touchcancel', onTouchCancel, { passive: false });
})();

async function fetchScreenInfo() {
  try {
    const r = await fetch(BASE + '/os/screen/info');
    if (!r.ok) return;
    const d = await r.json();
    screenW = d.width; screenH = d.height;
    document.getElementById('st-res').textContent = `${screenW}×${screenH}`;
  } catch(e) {}
}

// ── Settings ──────────────────────────────────────────────────────
const qSlider = document.getElementById('quality');
const sSlider = document.getElementById('scale');
const fpsSelect = document.getElementById('fps');
const qVal = document.getElementById('quality-val');
const sVal = document.getElementById('scale-val');

qSlider.addEventListener('input', () => { qVal.textContent = qSlider.value; applySettings(); });
sSlider.addEventListener('input', () => { sVal.textContent = sSlider.value; updateDisplaySize(); applySettings(); });
fpsSelect.addEventListener('change', applySettings);

function applySettings() {
  stopPolling();
  startPolling();
}

function getSettings() {
  return {
    quality: parseInt(qSlider.value),
    scale: parseInt(sSlider.value) / 100,
    fps: parseInt(fpsSelect.value),
  };
}

// ── Polling ───────────────────────────────────────────────────────
function startPolling() {
  const { fps } = getSettings();
  streaming = true;
  pollTimer = setInterval(fetchFrame, Math.round(1000 / fps));
}

function stopPolling() {
  streaming = false;
  clearInterval(pollTimer);
}

const img = document.getElementById('screen-img');
const overlay = document.getElementById('overlay');
let firstFrame = true;

async function fetchFrame() {
  const { quality, scale } = getSettings();
  const url = `${BASE}/os/screen/snapshot?quality=${quality}&scale=${scale}&_t=${Date.now()}`;
  const t0 = Date.now();
  try {
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error(r.status);
    const blob = await r.blob();
    const objUrl = URL.createObjectURL(blob);
    const oldSrc = img.src;
    img.src = objUrl;
    if (oldSrc.startsWith('blob:')) URL.revokeObjectURL(oldSrc);

    if (firstFrame) {
      overlay.style.display = 'none';
      firstFrame = false;
    }
    setConnected(true, Date.now() - t0);

    // FPS counter
    frameCount++;
    const now = Date.now();
    if (now - lastFpsTime >= 1000) {
      document.getElementById('fps-val').textContent = frameCount;
      frameCount = 0; lastFpsTime = now;
    }

    const dispW = Math.round(screenW * scale);
    const dispH = Math.round(screenH * scale);
    document.getElementById('st-disp').textContent = `${dispW}×${dispH}`;
    document.getElementById('st-last').textContent = new Date().toLocaleTimeString();

  } catch(e) {
    setConnected(false, null);
  }
}

function setConnected(ok, lat) {
  const badge = document.getElementById('conn-badge');
  const dot = badge.querySelector('.dot');
  const txt = document.getElementById('conn-text');
  if (ok) {
    badge.className = 'badge live';
    dot.className = 'dot pulse';
    txt.textContent = '연결됨';
    if (lat !== null) document.getElementById('lat-val').textContent = lat;
  } else {
    badge.className = 'badge err';
    dot.className = 'dot';
    txt.textContent = '오류';
  }
}

// ── Coordinate mapping ────────────────────────────────────────────
function coordsFromPoint(cx, cy) {
  const rect = img.getBoundingClientRect();
  const nx = Math.max(0, Math.min(1, (cx - rect.left) / rect.width));
  const ny = Math.max(0, Math.min(1, (cy - rect.top) / rect.height));
  return {
    x: Math.round(nx * screenW),
    y: Math.round(ny * screenH),
  };
}

function toScreenCoords(e) { return coordsFromPoint(e.clientX, e.clientY); }

// ── Touch events ──────────────────────────────────────────────────
function onTouchStart(e) {
  e.preventDefault();
  document.getElementById('viewport').focus();
  touch.count = e.touches.length;
  touch.moved = false;
  clearTimeout(touch.longTimer);

  if (e.touches.length === 1) {
    const t = e.touches[0];
    touch.startX = t.clientX; touch.startY = t.clientY;
    touch.prevX = t.clientX; touch.prevY = t.clientY;
    if (controlEnabled) {
      const { x, y } = coordsFromPoint(t.clientX, t.clientY);
      touch.longTimer = setTimeout(() => {
        if (!touch.moved) sendInput({ type: 'click', x, y, button: 'right' });
      }, 600);
    }
  } else if (e.touches.length === 2) {
    touch.twoFingerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    touch.twoFingerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    touch.prevX = touch.twoFingerX;
    touch.prevY = touch.twoFingerY;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    touch.pinchDist = Math.hypot(dx, dy);
    touch.pinchMode = null;
  }
}

function onTouchMove(e) {
  e.preventDefault();

  if (e.touches.length === 1) {
    const t = e.touches[0];
    const dx = t.clientX - touch.prevX;
    const dy = t.clientY - touch.prevY;
    if (Math.abs(t.clientX - touch.startX) > 5 || Math.abs(t.clientY - touch.startY) > 5) {
      touch.moved = true;
      clearTimeout(touch.longTimer);
    }

    if (viewZoom > 1.01) {
      panX += dx;
      panY += dy;
      touch.prevX = t.clientX;
      touch.prevY = t.clientY;
      applyViewTransform();
      return;
    }

    touch.prevX = t.clientX;
    touch.prevY = t.clientY;
    if (!controlEnabled) return;

    const now = Date.now();
    if (now - lastMoveTime < MOVE_THROTTLE_MS) return;
    lastMoveTime = now;
    const { x, y } = coordsFromPoint(t.clientX, t.clientY);
    document.getElementById('st-mouse').textContent = `${x}, ${y}`;
    sendInput({ type: 'move', x, y });

  } else if (e.touches.length === 2) {
    touch.moved = true;
    clearTimeout(touch.longTimer);
    const curMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const curMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const curDist = Math.hypot(dx, dy);
    const panDx = curMidX - touch.twoFingerX;
    const panDy = curMidY - touch.twoFingerY;

    // Decide pinch vs scroll on first significant move
    if (touch.pinchMode === null) {
      const distChange = Math.abs(curDist - touch.pinchDist);
      const scrollChange = Math.abs(curMidY - touch.twoFingerY);
      const panChange = Math.hypot(panDx, panDy);
      if (distChange > 8) touch.pinchMode = 'zoom';
      else if (viewZoom > 1.01 && panChange > 5) touch.pinchMode = 'pan';
      else if (scrollChange > 5) touch.pinchMode = 'scroll';
    }

    if (touch.pinchMode === 'zoom') {
      if (touch.pinchDist > 0) {
        const ratio = curDist / touch.pinchDist;
        setViewZoom(viewZoom * ratio, curMidX, curMidY);
      }
      touch.pinchDist = curDist;
      touch.twoFingerX = curMidX;
      touch.twoFingerY = curMidY;
    } else if (touch.pinchMode === 'pan') {
      panX += panDx;
      panY += panDy;
      touch.twoFingerX = curMidX;
      touch.twoFingerY = curMidY;
      applyViewTransform();
    } else if (touch.pinchMode === 'scroll') {
      const delta = curMidY - touch.twoFingerY;
      touch.twoFingerX = curMidX;
      touch.twoFingerY = curMidY;
      if (Math.abs(delta) > 2 && controlEnabled) {
        const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        const { x, y } = coordsFromPoint(mx, my);
        sendInput({ type: 'scroll', x, y, dy: delta > 0 ? 3 : -3 });
      }
    }
  }
}

function onTouchEnd(e) {
  e.preventDefault();
  clearTimeout(touch.longTimer);
  if (touch.moved || touch.count !== 1) return;

  const now = Date.now();
  const isDoubleTap = now - touch.lastTapTime < 300;

  if (isDoubleTap) {
    touch.lastTapTime = 0;
    if (!controlEnabled && viewZoom !== 1.0) {
      resetZoom();
      return;
    }
    if (controlEnabled) {
      const { x, y } = coordsFromPoint(touch.startX, touch.startY);
      sendInput({ type: 'click', x, y, double: true });
    }
  } else {
    touch.lastTapTime = now;
    if (controlEnabled) {
      const { x, y } = coordsFromPoint(touch.startX, touch.startY);
      sendInput({ type: 'mousedown', x, y, button: 'left' });
      sendInput({ type: 'mouseup',   x, y, button: 'left' });
    }
  }
}

function onTouchCancel(e) { clearTimeout(touch.longTimer); }

// ── Mouse events ──────────────────────────────────────────────────
function onMouseMove(e) {
  if (!controlEnabled) return;
  const now = Date.now();
  if (now - lastMoveTime < MOVE_THROTTLE_MS) return;
  lastMoveTime = now;
  const { x, y } = toScreenCoords(e);
  document.getElementById('st-mouse').textContent = `${x}, ${y}`;
  sendInput({ type: 'move', x, y });
}

function onMouseDown(e) {
  document.getElementById('viewport').focus();
  if (!controlEnabled) return;
  const { x, y } = toScreenCoords(e);
  const btn = e.button === 2 ? 'right' : e.button === 1 ? 'middle' : 'left';
  sendInput({ type: 'mousedown', x, y, button: btn });
}

function onMouseUp(e) {
  if (!controlEnabled) return;
  const { x, y } = toScreenCoords(e);
  const btn = e.button === 2 ? 'right' : e.button === 1 ? 'middle' : 'left';
  sendInput({ type: 'mouseup', x, y, button: btn });
}

function onDblClick(e) {
  if (!controlEnabled) return;
  const { x, y } = toScreenCoords(e);
  sendInput({ type: 'click', x, y, double: true });
}

function onContextMenu(e) {
  e.preventDefault();
  if (!controlEnabled) return;
  const { x, y } = toScreenCoords(e);
  sendInput({ type: 'click', x, y, button: 'right' });
}

function onWheel(e) {
  e.preventDefault();
  if (!controlEnabled) return;
  const { x, y } = toScreenCoords(e);
  const dy = e.deltaY > 0 ? -3 : 3;
  sendInput({ type: 'scroll', x, y, dy });
}

// ── Keyboard events ───────────────────────────────────────────────
const KEY_MAP = {
  'Enter': 'enter', 'Escape': 'esc', 'Backspace': 'backspace',
  'Delete': 'delete', 'Tab': 'tab', 'Space': 'space', ' ': 'space',
  'ArrowUp': 'up', 'ArrowDown': 'down', 'ArrowLeft': 'left', 'ArrowRight': 'right',
  'Home': 'home', 'End': 'end', 'PageUp': 'pageup', 'PageDown': 'pagedown',
  'Insert': 'insert', 'F1': 'f1', 'F2': 'f2', 'F3': 'f3', 'F4': 'f4',
  'F5': 'f5', 'F6': 'f6', 'F7': 'f7', 'F8': 'f8', 'F9': 'f9',
  'F10': 'f10', 'F11': 'f11', 'F12': 'f12',
};

function onKeyDown(e) {
  if (!controlEnabled) return;
  if (document.getElementById('type-input') === document.activeElement) return;
  e.preventDefault();

  const modifiers = [];
  if (e.ctrlKey)  modifiers.push('ctrl');
  if (e.altKey)   modifiers.push('alt');
  if (e.shiftKey) modifiers.push('shift');
  if (e.metaKey)  modifiers.push('win');

  const mapped = KEY_MAP[e.key];
  const isModOnly = ['Control','Alt','Shift','Meta'].includes(e.key);

  if (isModOnly) return;

  if (modifiers.length > 0) {
    const k = mapped || e.key.toLowerCase();
    sendInput({ type: 'hotkey', keys: [...modifiers, k] });
  } else if (mapped) {
    sendInput({ type: 'key', key: mapped });
  } else if (e.key.length === 1) {
    sendInput({ type: 'type', text: e.key });
  }
}

function onKeyUp(e) {
  // reserved for future drag tracking
}

// ── Type input ────────────────────────────────────────────────────
function onTypeInput(e) {
  if (e.key === 'Enter' && !e.isComposing) {
    e.preventDefault();
    sendTypedText();
  }
}

// ── Send helpers ──────────────────────────────────────────────────
function sendInput(payload, options = {}) {
  const request = fetch(BASE + '/os/screen/input', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
    credentials: 'include',
  }).then(async (r) => {
    if (!r.ok) throw new Error(await r.text());
    return r;
  });
  if (options.reportErrors) return request;
  request.catch(() => {});
  return request;
}

function sendKey(k) {
  sendInput({ type: 'key', key: k });
}

function sendHotkey(keys) {
  sendInput({ type: 'hotkey', keys });
}

async function sendTypedText() {
  const inp = document.getElementById('type-input');
  const btn = document.getElementById('btn-type-send');
  const text = inp.value;
  if (!text) {
    inp.focus();
    return;
  }

  inp.value = '';
  btn.disabled = true;
  btn.textContent = '전송중';
  try {
    await sendInput({ type: 'type', text }, { reportErrors: true });
  } catch (e) {
    inp.value = text;
    console.warn('Text input failed', e);
  } finally {
    btn.disabled = false;
    btn.textContent = '전송';
    inp.focus();
  }
}

function sendFullscreenKey() {
  sendInput({ type: 'key', key: 'f11' });
}

function sendCtrlAltDel() {
  sendHotkey(['ctrl', 'alt', 'delete']);
}

// ── Toggle control ────────────────────────────────────────────────
function toggleControl() {
  controlEnabled = !controlEnabled;
  const btn = document.getElementById('btn-ctrl');
  const st = document.getElementById('st-ctrl-state');
  if (controlEnabled) {
    btn.className = 'active';
    btn.textContent = '제어 ON';
    st.innerHTML = '제어: <b style="color:var(--green)">ON</b>';
    document.getElementById('viewport').style.cursor = 'crosshair';
  } else {
    btn.className = '';
    btn.textContent = '제어 OFF';
    st.innerHTML = '제어: <b>OFF</b>';
    document.getElementById('viewport').style.cursor = 'default';
  }
}

// ── Toggle keyboard panel ─────────────────────────────────────────
function toggleKbd() {
  const panel = document.getElementById('kbd-panel');
  const btn = document.getElementById('btn-kbd');
  const show = !panel.classList.contains('show');
  panel.classList.toggle('show', show);
  btn.className = show ? 'active' : '';
  if (show) document.getElementById('type-input').focus();
}

// ── Toggle full viewport ──────────────────────────────────────────
function toggleFullViewport() {
  const inFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
  if (!inFS) {
    const el = document.documentElement;
    (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen).call(el);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen).call(document);
  }
}

function syncFullscreenBtn() {
  const inFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
  const btn = document.getElementById('btn-fullvp');
  const topbar = document.getElementById('topbar');
  const controls = document.getElementById('controls');
  const statusbar = document.getElementById('statusbar');
  btn.className = inFS ? 'active' : '';
  btn.textContent = inFS ? '뷰 축소' : '뷰 확대';
  topbar.style.display = inFS ? 'none' : '';
  controls.style.display = inFS ? 'none' : '';
  statusbar.style.display = inFS ? 'none' : '';
}

document.addEventListener('fullscreenchange', syncFullscreenBtn);
document.addEventListener('webkitfullscreenchange', syncFullscreenBtn);

function updateDisplaySize() {
  // nothing needed — CSS handles it
}
</script>
