name: bucky-brain

# ─────────────────────────────────────────────
# 공통 베이스 (모든 서비스에 앵커로 적용)
# ─────────────────────────────────────────────
x-base: &base
  build:
    context: ..
    dockerfile: docker/Dockerfile
  working_dir: /workspace
  env_file:
    - .env
  environment:
    - PYTHONUNBUFFERED=1
    - PYTHONDONTWRITEBYTECODE=1
  volumes:
    # 소스 코드 (읽기 전용: 수정은 호스트에서)
    - ../scripts:/workspace/scripts:ro
    - ../configs:/workspace/configs:ro
    # ObsidianVault — 경로는 .env 의 VAULT_BASE_PATH 로 결정
    - ${VAULT_BASE_PATH}:/vault
    # 로컬 AI 프로젝트 경로 (집 PC: D:/ 노트북·사무실: C:/)
    - ${LOCAL_AI_PATH}:/ai-project
    # G드라이브 공유 (동기화 파일·Agent Room 전용)
    - ${GDRIVE_PATH}:/gdrive:ro
    # 로그 영구 보존
    - bucky-logs:/workspace/logs
  restart: unless-stopped
  networks:
    - bucky-net

# ─────────────────────────────────────────────
# 서비스 정의
# ─────────────────────────────────────────────
services:

  # 1. Discord 봇 + 에이전트 매니저 (항상 실행)
  bucky-core:
    <<: *base
    container_name: bucky-core
    command: ["python", "scripts/discord_bot.py"]
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - BUCKY_ROLE=core
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3

  # 2. 지식 정제기 — 주기적 실행 (cron 내장)
  knowledge-distiller:
    <<: *base
    container_name: knowledge-distiller
    command: ["python", "scripts/knowledge_distiller.py", "--watch"]
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - BUCKY_ROLE=distiller
      - VAULT_PATH=/vault
    profiles:
      - distiller
      - full

  # 3. 데이터 수집 스케줄러
  collection-scheduler:
    <<: *base
    container_name: collection-scheduler
    command: ["python", "scripts/collection_scheduler.py", "--run"]
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - BUCKY_ROLE=collector
      - VAULT_PATH=/vault
    profiles:
      - collector
      - full

  # 4. Redis — AgentBus 상태 공유 (옵션)
  redis:
    image: redis:7-alpine
    container_name: bucky-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    networks:
      - bucky-net
    profiles:
      - redis
      - full
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

# ─────────────────────────────────────────────
# 볼륨 · 네트워크
# ─────────────────────────────────────────────
volumes:
  bucky-logs:
  redis-data:

networks:
  bucky-net:
    driver: bridge
