[build]
  publish = "docs"

[[edge_functions]]
  path = "/*"
  function = "auth"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/wishket.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/daily-plus.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/task-board.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/ai-usage.html"
  [headers.values]
    Cache-Control = "no-store"
