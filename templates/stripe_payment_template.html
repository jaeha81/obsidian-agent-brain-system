<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{PRODUCT_NAME}} — 결제</title>
  <script src="https://js.stripe.com/v3/"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --brand: {{BRAND_COLOR}};
    }
    body { font-family: 'Pretendard', -apple-system, sans-serif; }
    #card-element {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      background: white;
    }
    #card-errors { color: #e53e3e; font-size: 0.875rem; margin-top: 8px; }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid var(--brand, #6366f1);
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full">

    <!-- 상품 카드 -->
    <div class="bg-white rounded-2xl shadow-lg p-8 mb-6">
      <div class="text-center mb-6">
        <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4"
             style="background: linear-gradient(135deg, {{BRAND_COLOR}} 0%, {{BRAND_COLOR_LIGHT}} 100%);">
          <span class="text-white text-2xl">{{PRODUCT_ICON}}</span>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">{{PRODUCT_NAME}}</h1>
        <p class="text-gray-500 text-sm mt-1">{{PRODUCT_TAGLINE}}</p>
      </div>

      <!-- 플랜 선택 -->
      <div class="space-y-3 mb-6">
        <button class="plan-btn w-full flex items-center justify-between p-4 rounded-xl border-2 border-indigo-500 bg-indigo-50 transition"
                data-price="{{PRICE_MONTHLY}}" data-label="월간 플랜" data-period="month">
          <div class="flex items-center gap-3">
            <div class="w-5 h-5 rounded-full border-2 border-indigo-500 flex items-center justify-center">
              <div class="w-2.5 h-2.5 rounded-full bg-indigo-500"></div>
            </div>
            <div class="text-left">
              <div class="font-semibold text-gray-900">월간 플랜</div>
              <div class="text-xs text-gray-500">매월 자동 결제</div>
            </div>
          </div>
          <div class="text-right">
            <div class="font-bold text-gray-900">₩{{PRICE_MONTHLY}}<span class="text-sm font-normal text-gray-500">/월</span></div>
          </div>
        </button>

        <button class="plan-btn w-full flex items-center justify-between p-4 rounded-xl border-2 border-gray-200 bg-white hover:border-indigo-300 transition"
                data-price="{{PRICE_YEARLY}}" data-label="연간 플랜" data-period="year">
          <div class="flex items-center gap-3">
            <div class="w-5 h-5 rounded-full border-2 border-gray-300 flex items-center justify-center">
              <div class="w-2.5 h-2.5 rounded-full bg-transparent"></div>
            </div>
            <div class="text-left">
              <div class="font-semibold text-gray-900">연간 플랜</div>
              <div class="text-xs text-green-600 font-medium">2개월 무료 절약</div>
            </div>
          </div>
          <div class="text-right">
            <div class="font-bold text-gray-900">₩{{PRICE_YEARLY}}<span class="text-sm font-normal text-gray-500">/년</span></div>
            <div class="text-xs text-gray-400 line-through">₩{{PRICE_YEARLY_ORIGINAL}}</div>
          </div>
        </button>
      </div>

      <!-- 기능 목록 -->
      <ul class="space-y-2 mb-6 text-sm text-gray-600">
        {{FEATURE_LIST}}
      </ul>

      <hr class="my-6 border-gray-100" />

      <!-- Stripe 카드 입력 -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">카드 정보</label>
        <div id="card-element"></div>
        <div id="card-errors" role="alert"></div>
      </div>

      <!-- 이메일 -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">이메일</label>
        <input type="email" id="email" placeholder="your@email.com"
               class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
      </div>

      <!-- 결제 버튼 -->
      <button id="submit-btn"
              class="w-full py-4 rounded-xl text-white font-semibold text-base transition-all"
              style="background: var(--brand, #6366f1);">
        <span id="btn-text">지금 시작하기</span>
        <span id="btn-spinner" class="hidden"><span class="spinner"></span></span>
      </button>

      <p class="text-center text-xs text-gray-400 mt-4">
        🔒 256-bit SSL 암호화 · Stripe 보안 결제 · 언제든 취소 가능
      </p>
    </div>

    <!-- 성공 메시지 (hidden) -->
    <div id="success-msg" class="hidden bg-green-50 border border-green-200 rounded-2xl p-6 text-center">
      <div class="text-4xl mb-3">✅</div>
      <h2 class="text-xl font-bold text-green-800 mb-2">결제 완료!</h2>
      <p class="text-green-600 text-sm">환영합니다. 이메일을 확인해주세요.</p>
    </div>

  </div>

  <script>
    const STRIPE_PK = "{{STRIPE_PUBLISHABLE_KEY}}";
    const stripe = Stripe(STRIPE_PK);
    const elements = stripe.elements();

    const cardElement = elements.create("card", {
      style: {
        base: {
          fontFamily: "Pretendard, -apple-system, sans-serif",
          fontSize: "16px",
          color: "#1a202c",
          "::placeholder": { color: "#a0aec0" },
        },
      },
      hidePostalCode: true,
    });
    cardElement.mount("#card-element");

    cardElement.on("change", (e) => {
      document.getElementById("card-errors").textContent = e.error ? e.error.message : "";
    });

    // 플랜 선택 토글
    let selectedPlan = { price: "{{PRICE_MONTHLY}}", label: "월간 플랜", period: "month" };
    document.querySelectorAll(".plan-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".plan-btn").forEach((b) => {
          b.classList.remove("border-indigo-500", "bg-indigo-50");
          b.classList.add("border-gray-200", "bg-white");
          b.querySelector(".w-2\\.5").classList.replace("bg-indigo-500", "bg-transparent");
          b.querySelector(".w-5").classList.replace("border-indigo-500", "border-gray-300");
        });
        btn.classList.add("border-indigo-500", "bg-indigo-50");
        btn.classList.remove("border-gray-200", "bg-white");
        btn.querySelector(".w-2\\.5").classList.replace("bg-transparent", "bg-indigo-500");
        btn.querySelector(".w-5").classList.replace("border-gray-300", "border-indigo-500");
        selectedPlan = {
          price: btn.dataset.price,
          label: btn.dataset.label,
          period: btn.dataset.period,
        };
      });
    });

    // 결제 처리
    document.getElementById("submit-btn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      if (!email || !email.includes("@")) {
        document.getElementById("card-errors").textContent = "올바른 이메일을 입력해주세요.";
        return;
      }

      setLoading(true);

      try {
        // 백엔드에서 PaymentIntent 생성
        const res = await fetch("/api/create-payment-intent", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, plan: selectedPlan.period }),
        });
        const { clientSecret, error: serverError } = await res.json();
        if (serverError) throw new Error(serverError);

        const { error, paymentIntent } = await stripe.confirmCardPayment(clientSecret, {
          payment_method: { card: cardElement, billing_details: { email } },
        });

        if (error) {
          document.getElementById("card-errors").textContent = error.message;
          setLoading(false);
        } else if (paymentIntent.status === "succeeded") {
          document.querySelector(".bg-white.rounded-2xl").classList.add("hidden");
          document.getElementById("success-msg").classList.remove("hidden");
        }
      } catch (err) {
        document.getElementById("card-errors").textContent = err.message;
        setLoading(false);
      }
    });

    function setLoading(isLoading) {
      const btn = document.getElementById("submit-btn");
      btn.disabled = isLoading;
      document.getElementById("btn-text").classList.toggle("hidden", isLoading);
      document.getElementById("btn-spinner").classList.toggle("hidden", !isLoading);
    }
  </script>
</body>
</html>
