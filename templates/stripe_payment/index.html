<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PRODUCT_NAME}} — 구독 시작</title>
  <script src="https://js.stripe.com/v3/"></script>
  <script src="https://js.tosspayments.com/v1/payment"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif;
           background: #0f172a; color: #e2e8f0; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px;
            padding: 40px; max-width: 440px; width: 90%; }
    .logo { font-size: 2rem; font-weight: 800; color: #3b82f6; margin-bottom: 8px; }
    .tagline { color: #64748b; font-size: 0.9rem; margin-bottom: 32px; }
    .price-box { background: #0f172a; border-radius: 12px; padding: 24px;
                 text-align: center; margin-bottom: 28px; }
    .price { font-size: 2.5rem; font-weight: 700; color: #e2e8f0; }
    .price-period { color: #64748b; font-size: 0.9rem; }
    .features { list-style: none; margin-bottom: 28px; }
    .features li { padding: 8px 0; color: #94a3b8; display: flex; align-items: center; gap: 8px; }
    .features li::before { content: "✓"; color: #22c55e; font-weight: 700; }
    .email-input { width: 100%; padding: 12px 16px; background: #0f172a;
                   border: 1px solid #334155; border-radius: 8px; color: #e2e8f0;
                   font-size: 0.95rem; margin-bottom: 12px; outline: none; }
    .email-input:focus { border-color: #3b82f6; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 8px;
           font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-stripe { background: #3b82f6; color: white; margin-bottom: 10px; }
    .btn-stripe:hover { background: #2563eb; }
    .btn-toss { background: #3182f6; color: white; }
    .btn-toss:hover { background: #1c6de0; }
    .divider { text-align: center; color: #475569; font-size: 0.8rem; margin: 12px 0; }
    .secure { text-align: center; color: #475569; font-size: 0.75rem; margin-top: 16px; }
    .error { color: #ef4444; font-size: 0.85rem; margin-top: 8px; display: none; }
    #loading { display: none; text-align: center; color: #64748b; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">{{LOGO_CHAR}} {{PRODUCT_NAME}}</div>
    <div class="tagline">{{TAGLINE}}</div>

    <div class="price-box">
      <div class="price">₩{{PRICE_KRW}}</div>
      <div class="price-period">/월 · 언제든 취소 가능</div>
    </div>

    <ul class="features">
      {{FEATURE_LIST}}
    </ul>

    <input type="email" id="email" class="email-input" placeholder="이메일 주소 입력">
    <div id="error" class="error"></div>

    <button class="btn btn-stripe" onclick="payStripe()">💳 카드로 결제 (Stripe)</button>
    <div class="divider">또는</div>
    <button class="btn btn-toss" onclick="payToss()">🏦 간편결제 (토스페이먼츠)</button>

    <div id="loading">결제 페이지 연결 중...</div>
    <div class="secure">🔒 SSL 암호화 · PCI DSS 인증 · 안전한 결제</div>
  </div>

  <script>
    const STRIPE_PK = '{{STRIPE_PUBLISHABLE_KEY}}';
    const TOSS_CLIENT_KEY = '{{TOSS_CLIENT_KEY}}';
    const PRODUCT_NAME = '{{PRODUCT_NAME}}';
    const PRICE_KRW = {{PRICE_KRW_NUM}};

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    function setLoading(on) {
      document.getElementById('loading').style.display = on ? 'block' : 'none';
    }

    async function payStripe() {
      const email = document.getElementById('email').value;
      if (!email) { showError('이메일을 입력해주세요.'); return; }
      setLoading(true);
      try {
        const res = await fetch('/api/stripe/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, mode: 'subscription' })
        });
        const data = await res.json();
        if (data.url) window.location.href = data.url;
        else showError(data.detail || '결제 페이지 생성 실패');
      } catch (e) {
        showError('서버 연결 실패: ' + e.message);
      } finally {
        setLoading(false);
      }
    }

    async function payToss() {
      if (!TOSS_CLIENT_KEY || TOSS_CLIENT_KEY === '{{TOSS_CLIENT_KEY}}') {
        showError('Toss Payments 설정이 필요합니다 (.env TOSS_CLIENT_KEY)');
        return;
      }
      const email = document.getElementById('email').value;
      const tossPayments = TossPayments(TOSS_CLIENT_KEY);
      const orderId = 'order_' + Date.now();
      try {
        await tossPayments.requestPayment('카드', {
          amount: PRICE_KRW,
          orderId,
          orderName: PRODUCT_NAME + ' 월간 구독',
          customerEmail: email,
          successUrl: window.location.origin + '/toss/success',
          failUrl: window.location.origin + '/cancel',
        });
      } catch (e) {
        showError('결제 취소 또는 실패: ' + e.message);
      }
    }
  </script>
</body>
</html>
