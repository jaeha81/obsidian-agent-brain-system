name: Vercel Landing Page Deploy

on:
  push:
    branches: [master]
    paths:
      - 'generated/landing_pages/**'
      - 'templates/landing_page_template.html'
  workflow_dispatch:
    inputs:
      repo_name:
        description: '배포할 레포 이름 (generated/landing_pages/<name>.html)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install requests python-dotenv

      - name: Detect changed landing pages
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.repo_name }}" ]; then
            echo "pages=${{ inputs.repo_name }}" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'generated/landing_pages/*.html' | xargs -I{} basename {} .html | tr '\n' ' ')
            echo "pages=${CHANGED}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy each landing page to Vercel
        if: steps.changed.outputs.pages != ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          for PAGE in ${{ steps.changed.outputs.pages }}; do
            HTML="generated/landing_pages/${PAGE}.html"
            if [ ! -f "$HTML" ]; then
              echo "⚠️  $HTML 없음 — 건너뜀"
              continue
            fi
            DEPLOY_DIR="generated/deployments/${PAGE}"
            mkdir -p "$DEPLOY_DIR"
            cp "$HTML" "$DEPLOY_DIR/index.html"
            cat > "$DEPLOY_DIR/vercel.json" <<EOF
          {
            "name": "${PAGE}",
            "version": 2,
            "routes": [{"src": "/(.*)", "dest": "/index.html"}]
          }
          EOF
            echo "🚀 ${PAGE} 배포 중..."
            URL=$(vercel "$DEPLOY_DIR" --yes --prod --token=$VERCEL_TOKEN 2>&1 | grep '^https://' | tail -1)
            echo "✅ ${PAGE} → ${URL}"
            if [ -n "$DISCORD_WEBHOOK_URL" ] && [ -n "$URL" ]; then
              curl -s -X POST "$DISCORD_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d "{\"content\": \"✅ **${PAGE}** 랜딩 페이지 배포 완료!\\n🌐 ${URL}\"}"
            fi
          done
